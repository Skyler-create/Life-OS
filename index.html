  const head = `<div class="wk-head"><span class="wk-gutter"></span>${days.map((d, i) => {
    const iso = isos[i]; const nT = (byDay[iso] || []).length;
    return `<button class="wk-col-h ${iso === todayISO() ? 'now' : ''}" onclick="selDay('${iso}')">
      <span class="wd">${d.toLocaleDateString('en-US', {weekday: 'narrow'})}</span>
      <span class="dn">${d.getDate()}</span>${nT ? `<i class="td">${nT}</i>` : ''}</button>`;
  }).join('')}</div>`;
  const allday = isos.map(iso => (evByDay[iso] || []).filter(e => !e.start_time));
  const adRow = allday.some(a => a.length) ? `<div class="wk-allday"><span class="wk-gutter"></span>${allday.map(a =>
    `<div class="wk-ad-cell">${a.slice(0, 2).map(e => `<div class="wk-banner">${esc(e.title)}</div>`).join('')}${a.length > 2 ? `<div class="wk-banner more">+${a.length - 2}</div>` : ''}</div>`).join('')}</div>` : '';
  const rail = [...Array(H1 - H0)].map((_, i) => `<div class="hrow" style="top:${i * PPH}px"><span>${hourLabel(H0 + i).replace(' ', '')}</span></div>`).join('');
  const cols = isos.map(iso => {
    const timed = (evByDay[iso] || []).filter(e => e.start_time);
    const blocks = timed.map(e => {
      const [sh, sm] = e.start_time.split(':').map(Number);
      let dur = 60;
      if (e.end_time) { const [eh, em] = e.end_time.split(':').map(Number); dur = Math.max(25, (eh * 60 + em) - (sh * 60 + sm)); }
      const top = Math.max(0, ((sh - H0) * 60 + sm) * (PPH / 60));
      const h = Math.max(18, dur * (PPH / 60));
      return `<div class="wk-ev" style="top:${top.toFixed(0)}px;height:${h.toFixed(0)}px;cursor:pointer" onclick="event.stopPropagation();openEv(${e._i})">${esc(e.title)}</div>`;
    }).join('');
    const nowline = iso === todayISO() ? (() => {
      const n = new Date(); const mins = (n.getHours() - H0) * 60 + n.getMinutes();
      return (mins > 0 && mins < (H1 - H0) * 60) ? `<div class="nowline" style="top:${(mins * PPH / 60).toFixed(0)}px"></div>` : '';
    })() : '';
    return `<div class="wk-col ${iso === todayISO() ? 'now' : ''}" data-iso="${iso}" style="position:relative" onclick="weekGridTap(event, '${iso}')" onpointerdown="gridPressStart(event, '${iso}', ${PPH}, ${H0})">${blocks}${planBlockDivs(iso, H0, PPH, 'week')}${nowline}</div>`;
  }).join('');
  return head + adRow + `<div class="gridwrap" id="gridScroll" data-h6="${6 * PPH}" onscroll="S._gsPos=this.scrollTop;S._gsAt=Date.now()">
    <div class="wk-grid" style="height:${(H1 - H0) * PPH}px"><div class="wk-rail">${rail}</div>${cols}</div></div>
  <div class="dim mono" style="font-size:10px;margin-top:6px">tap day header = day view · tap slot = new event · hold & drag 💡 blocks to replan (across days too) · 📌 = locked</div>`;
}
const hourLabel = h => h === 0 ? '12 AM' : h < 12 ? h + ' AM' : h === 12 ? '12 PM' : (h - 12) + ' PM';
function calDayHTML(iso, byDay, evByDay){
  const evs = (evByDay[iso] || []).slice().sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
  const allday = evs.filter(e => !e.start_time);
  const timed = evs.filter(e => e.start_time);
  const H0 = 0, H1 = 24, PPH = 48;   // full 24h; wrapper opens scrolled to 6 AM
  const blocks = timed.map(e => {
    const [sh, sm] = e.start_time.split(':').map(Number);
    let dur = 60;
    if (e.end_time) { const [eh, em] = e.end_time.split(':').map(Number); dur = Math.max(20, (eh * 60 + em) - (sh * 60 + sm)); }
    const top = Math.max(0, ((sh - H0) * 60 + sm) * (PPH / 60));
    const h = Math.max(22, dur * (PPH / 60));
    return `<div class="evblk" style="top:${top.toFixed(0)}px;height:${h.toFixed(0)}px;cursor:pointer" onclick="event.stopPropagation();openEv(${e._i})"><b>${esc(e.start_time)}${e.end_time ? '–' + esc(e.end_time) : ''}</b>${esc(e.title)}${e.cal && !e.writable ? ' 🔒' : ''}</div>`;
  }).join('');
  const rail = [...Array(H1 - H0)].map((_, i) => `<div class="hrow" style="top:${i * PPH}px"><span>${hourLabel(H0 + i)}</span></div>`).join('');
  const nowLine = iso === todayISO() ? (() => {
    const n = new Date(); const mins = (n.getHours() - H0) * 60 + n.getMinutes();
    return (mins > 0 && mins < (H1 - H0) * 60) ? `<div class="nowline" style="top:${(mins * PPH / 60).toFixed(0)}px"></div>` : '';
  })() : '';
  const due = byDay[iso] || [];
  const doneDay = S.tasks.filter(t => t.due === iso && t.status === 'done');
  return `${allday.map(e => `<div class="evrow" style="cursor:pointer" onclick="openEv(${e._i})"><span class="mono">all-day</span><span>${esc(e.title)}</span></div>`).join('')}
  ${due.length || doneDay.length ? `<div class="pname">due — ${due.length} open${doneDay.length ? ' · ' + doneDay.length + ' done' : ''}</div>` : ''}
  ${due.map(taskRowHTML).join('')}
  <div class="gridwrap" id="gridScroll" data-h6="${6 * PPH}" onscroll="S._gsPos=this.scrollTop;S._gsAt=Date.now()">
    <div class="daygrid" style="height:${(H1 - H0) * PPH}px;position:relative" onclick="dayGridTap(event, '${iso}', ${PPH})" onpointerdown="gridPressStart(event, '${iso}', ${PPH}, ${H0})">${rail}${blocks}${planBlockDivs(iso, H0, PPH, 'day')}${nowLine}</div>
  </div>
  <div class="dim mono" style="font-size:10px;margin-top:4px">solid = calendar · dashed 💡 = plan (hold & drag to move) · 📌 = locked</div>
  <button class="btn" style="width:100%;margin-top:8px" onclick="addForDay()">+ add task due ${iso}</button>
  <div style="height:10px"></div>`;
}

/* --- CARDS (spaced-repetition flashcards, replaces Anki) --- */
function rCards(){
  if (!S.cardMode) S.cardMode = localStorage.getItem('cardMode') || 'mcq';
  if (S.earn) return earnQuizHTML();
  const earnedToday = S.credits && S.credits.cards_earned;
  const earnBtn = earnedToday
    ? `<div class="dim" style="font-size:12px;padding:6px 0;margin-bottom:4px">🎁 IG-time bonus already earned today (+5 min, cap 95).</div>`
    : `<button class="btn" style="width:100%;margin-bottom:10px;border-color:var(--accent);color:var(--accent)" onclick="startEarnQuiz()">🎁 Earn 5 min off IG — get 5 cards right (once/day)</button>`;
  const q = S.cards || [];
  if (!q.length) return earnBtn + `<div class="empty">No cards due.<br><br>New cards arrive with each morning brief. Reviews reschedule themselves.</div>`;
  const card = q[0];
  const modeChips = `<div class="chiprow" style="margin-bottom:10px">${[['mcq','MCQ'],['type','TYPE'],['flip','FLIP']].map(([m,l]) =>
    `<button class="schip ${S.cardMode===m?'on':''}" style="flex:1" onclick="setCardMode('${m}')">${l}</button>`).join('')}</div>`;
  const head = `<div class="pname">${q.length} due</div>${earnBtn}${modeChips}`;
  if (S.cardMode === 'mcq')  return head + cardMcqHTML(card);
  if (S.cardMode === 'type') return head + cardTypeHTML(card);
  return head + cardFlipHTML(card);
}
function setCardMode(m){ S.cardMode = m; localStorage.setItem('cardMode', m); S.mcq = null; S.typed = null; S.showBack = false; render(); }

/* FLIP (classic) */
function cardFlipHTML(card){
  return `<div class="card"><h2>${esc(card.category || 'card')}${card.topic ? ' · ' + esc(card.topic) : ''}</h2>
    <div class="fc-front">${esc(card.front)}</div>
    ${S.showBack ? `<div class="fc-back">${esc(card.back)}</div>` : ''}</div>
  ${S.showBack
    ? `<div style="display:flex;gap:8px">
        <button class="btn" style="flex:1;color:var(--accent)" onclick="gradeCard(0)">Again</button>
        <button class="btn" style="flex:1" onclick="gradeCard(1)">Good</button>
        <button class="btn" style="flex:1;color:var(--done)" onclick="gradeCard(2)">Easy</button></div>
      <button class="btn" style="width:100%;margin-top:8px;color:var(--dim)" onclick="suspendCard()">suspend card</button>`
    : `<button class="btn primary" style="width:100%;padding:12px" onclick="S.showBack=true;render()">Show answer</button>`}
  <div style="height:10px"></div>`;
}

/* MCQ (deterministic, no LLM) */
function buildOneMcq(card){
  const options = _mcqOpts(card);
  return { cardId: card.id, options, answer: options.indexOf(card.back), picked: null };
}
function cardMcqHTML(card){
  if (!S.mcq || S.mcq.cardId !== card.id) S.mcq = buildOneMcq(card);
  const m = S.mcq;
  if (m.options.length < 2) return cardFlipHTML(card);   // not enough cards for choices
  const opts = m.options.map((o,i) => {
    let extra = '';
    if (m.picked != null) { if (i === m.answer) extra = ';border-color:var(--done);color:var(--done)'; else if (i === m.picked) extra = ';border-color:#E1251B;color:#E1251B'; }
    return `<button class="btn" style="display:block;width:100%;text-align:left;margin-bottom:6px${extra}" onclick="answerMcq(${i})">${esc(o)}</button>`;
  }).join('');
  return `<div class="card"><h2>${esc(card.category || 'card')}${card.topic ? ' · ' + esc(card.topic) : ''}</h2>
    <div class="fc-front">${esc(card.front)}</div></div>
    ${opts}
    ${m.picked != null ? `<button class="btn primary" style="width:100%;margin-top:4px" onclick="nextMcq()">${m.picked === m.answer ? '✓ correct — Next' : '✗ Next'}</button>` : ''}
  <div style="height:10px"></div>`;
}
function answerMcq(i){ if (S.mcq.picked != null) return; S.mcq.picked = i; render(); }
function nextMcq(){ const correct = S.mcq.picked === S.mcq.answer; S.mcq = null; if (correct) bumpCardsCorrect(); gradeCard(correct ? 1 : 0); }

/* TYPE (free-text, graded by the swappable `grade` edge function → Claude Haiku) */
function cardTypeHTML(card){
  const t = (S.typed && S.typed.cardId === card.id) ? S.typed : null;
  const vColor = {correct:'var(--done)', partial:'var(--focus)', wrong:'var(--accent)'};
  return `<div class="card"><h2>${esc(card.category || 'card')}${card.topic ? ' · ' + esc(card.topic) : ''}</h2>
    <div class="fc-front">${esc(card.front)}</div>
    ${t && !t.grading ? `<div class="fc-back" style="margin-top:8px"><b style="color:${vColor[t.verdict] || 'var(--dim)'}">${(t.verdict || '').toUpperCase()}</b> — ${esc(t.feedback || '')}</div>
      <div class="fc-back" style="margin-top:6px"><span class="dim">answer:</span> ${esc(card.back)}</div>` : ''}
  </div>
  ${!t ? `<textarea id="typeans" rows="2" placeholder="type your answer" style="width:100%"></textarea>
    <button class="btn primary" style="width:100%;margin-top:8px" onclick="submitTyped()">Check</button>`
   : t.grading ? `<div class="typing">grading…</div>`
   : `<div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn" style="flex:1;color:var(--accent)" onclick="gradeTyped(0)">Again</button>
        <button class="btn" style="flex:1" onclick="gradeTyped(1)">Good</button>
        <button class="btn" style="flex:1;color:var(--done)" onclick="gradeTyped(2)">Easy</button></div>`}
  <div style="height:10px"></div>`;
}
async function submitTyped(){
  const card = (S.cards || [])[0]; if (!card) return;
  const inp = document.getElementById('typeans'); const ans = (inp?.value || '').trim();
  if (!ans) { toast('Type an answer first'); return; }
  S.typed = {cardId: card.id, ans, grading: true}; render();
  try {
    const {data:{session}} = await db.auth.getSession();
    const r = await fetch(SB_URL + '/functions/v1/grade', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization':'Bearer ' + session.access_token},
      body: JSON.stringify({front: card.front, back: card.back, answer: ans}),
    });
    const d = await r.json();
    S.typed = {cardId: card.id, ans, verdict: d.verdict || 'partial', feedback: d.feedback || ''};
    if (d.verdict === 'correct') bumpCardsCorrect();
  } catch(e) {
    S.typed = {cardId: card.id, ans, verdict: 'partial', feedback: 'Network error — grade yourself'};
  }
  render();
}
function gradeTyped(g){ S.typed = null; gradeCard(g); }

/* EARN quiz: 5 correct MCQ → +5 min off IG (cap 95), once/day */
function startEarnQuiz(){
  const qs = buildWakeQuestions();
  if (qs.length < 2) { toast('Need more cards to quiz'); return; }
  S.earn = {questions: qs, idx: 0, picked: null};
  render();
}
function answerEarn(i){ if (S.earn.picked != null) return; S.earn.picked = i; render(); }
async function nextEarn(){
  const e = S.earn, q = e.questions[e.idx];
  if (e.picked === q.answer) await bumpCardsCorrect();   // shared daily counter claims at 5
  e.idx++; e.picked = null;
  if ((S.credits && S.credits.cards_earned) || cardsCorrectToday() >= 5) { S.earn = null; render(); return; }
  if (e.idx >= e.questions.length) { e.questions = buildWakeQuestions(); e.idx = 0; }
  render();
}
function cancelEarn(){ S.earn = null; render(); }
function earnQuizHTML(){
  const e = S.earn, q = e.questions[e.idx];
  if (!q) { S.earn = null; return rCards(); }
  const done = cardsCorrectToday();
  const opts = q.options.map((o,i) => {
    let extra = '';
    if (e.picked != null) { if (i === q.answer) extra = ';border-color:var(--done);color:var(--done)'; else if (i === e.picked) extra = ';border-color:#E1251B;color:#E1251B'; }
    return `<button class="btn" style="display:block;width:100%;text-align:left;margin-bottom:6px${extra}" onclick="answerEarn(${i})">${esc(o)}</button>`;
  }).join('');
  return `<div class="card" style="border-color:var(--accent)"><h2>🎁 Earn 5 min off IG</h2>
    <div class="dim" style="font-size:11px;margin-bottom:8px">${done}/5 correct today — 5 unlocks +5 min (cap 95), once/day</div>
    <div style="font-weight:600;margin-bottom:8px">${esc(q.front)}</div>${opts}
    ${e.picked != null ? `<button class="btn primary" style="width:100%;margin-top:4px" onclick="nextEarn()">Next</button>` : ''}
    <button class="btn" style="width:100%;margin-top:6px;color:var(--dim)" onclick="cancelEarn()">cancel</button></div>`;
}
async function gradeCard(g){
  const c = (S.cards || [])[0]; if (!c) return;
  let iv = c.interval_days, ease = +c.ease, reps = c.reps, lapses = c.lapses;
  if (g === 0)      { lapses++; iv = 0; ease = Math.max(1.3, ease - 0.2); }
  else if (g === 1) { iv = iv < 1 ? 1 : Math.round(iv * ease); reps++; }
  else              { ease += 0.15; iv = Math.max(2, Math.round((iv || 1) * ease * 1.3)); reps++; }
  const d = new Date(); d.setDate(d.getDate() + iv);
  const patch = {interval_days: iv, ease, reps, lapses, due: g === 0 ? todayISO() : d.toLocaleDateString('sv-SE')};
  S.lastWrite = Date.now();
  db.from('cards').update(patch).eq('id', c.id).then(({error}) => { if (error) toast('Save failed: ' + error.message); });
  S.cards.shift();
  if (g === 0) S.cards.push({...c, ...patch}); // failed cards come back this session
  S.showBack = false; render();
}
async function suspendCard(){
  const c = (S.cards || [])[0]; if (!c) return;
  S.lastWrite = Date.now();
  await db.from('cards').update({suspended: true}).eq('id', c.id);
  S.cards.shift(); S.showBack = false; render(); toast('Suspended');
}

/* --- CHAT (embedded, via Supabase edge function -> Claude API) --- */
function rChat(){
  const msgs = S.chat.map(m => m.role === 'user'
    ? `<div class="msg user">${esc(m.content)}</div>`
    : `<div class="msg bot">${marked.parse(m.content || '')}</div>`).join('');
  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h2 style="margin:0">LifeOS chat</h2>
      <span style="display:flex;gap:6px">
        <a class="btn" style="padding:4px 10px;font-size:11px;text-decoration:none" href="${CLAUDE_URL}" target="_blank" rel="noopener">Claude ↗</a>
        <button class="btn" style="padding:4px 10px;font-size:11px" onclick="clearChat()">Clear</button>
      </span>
    </div>
    <div id="chatlog">${msgs || '<div class="empty">Talk to your system. "done with X" · "whats next" · "im gassed" · "add task: ..."</div>'}${S.sending ? '<div class="typing">thinking…</div>' : ''}</div>
    <div id="chatrow">
      <input id="chatinput" placeholder="what's next?" enterkeyhint="send" ${S.sending ? 'disabled' : ''}>
      <button class="btn primary" onclick="sendChat()" ${S.sending ? 'disabled' : ''}>Send</button>
    </div>
  </div>`;
}
function clearChat(){
  if (S.chat.length && !confirm('Clear conversation?')) return;
  S.chat = []; localStorage.removeItem('chatHistory'); render();
}
async function sendChat(){
  const inp = document.getElementById('chatinput');
  const text = (inp?.value || '').trim();
  if (!text || S.sending) return;
  S.chat.push({role: 'user', content: text});
  S.sending = true; render();
  try {
    const {data: {session}} = await db.auth.getSession();
    const r = await fetch(SB_URL + '/functions/v1/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token},
      body: JSON.stringify({messages: S.chat.slice(-20)}),
    });
    const d = await r.json();
    S.chat.push({role: 'assistant', content: d.reply || ('⚠ ' + (d.error || 'HTTP ' + r.status))});
  } catch (e) {
    S.chat.push({role: 'assistant', content: '⚠ Network error: ' + e.message});
  }
  S.sending = false;
  S.chat = S.chat.slice(-40);
  localStorage.setItem('chatHistory', JSON.stringify(S.chat));
  render();
  loadAll(); // chat may have written to the DB
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement?.id === 'chatinput') sendChat();
});

/* ================= SETTINGS ================= */
function rSettings(){
  const gate = (S.settings && S.settings.wake_gate) === 'on';
  const pushOn = pushSupported() && Notification.permission === 'granted';
  const toggleRow = (icon, title, desc, on, onclick) => `
    <div style="display:flex;align-items:center;gap:10px;margin-top:10px">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px">${icon} ${title}</div>
        <div class="dim" style="font-size:11px">${desc}</div>
      </div>
      <button class="btn ${on ? 'primary' : ''}" style="flex:0 0 auto" onclick="${onclick}">${on ? 'ON' : 'OFF'}</button>
    </div>`;
  return `
  <div class="card"><h2>Time &amp; wake</h2>
    ${tzPickerHTML()}
    ${wakeTargetsHTML()}
    ${toggleRow('🌅', 'Wake gate', 'Block the first IG/YT scroll of the day until the brief has been opened.', gate, `saveWakeGate('${gate ? 'off' : 'on'}')`)}
  </div>
  <div class="card"><h2>Notifications</h2>
    <div class="dim" style="font-size:11px;margin-bottom:8px">Brief-ready, reality-check, streak-risk + reflection nudges. iOS: install to Home Screen first, then enable from the installed app.</div>
    <button class="btn ${pushOn ? 'primary' : ''}" onclick="enablePush()">${pushOn ? '🔔 Push enabled on this device' : '🔔 Enable push'}</button>
  </div>
  <div class="card"><h2>Reading</h2>
    ${toggleRow('Aa', 'Bionic reading', 'Bold word-starts in the brief for faster scanning (this device).', S.bionic, `toggleBionic()`)}
  </div>
  ${projectsCardHTML()}`;
}
function projectsCardHTML(){
  const projs = distinctProjects();
  const count = p => S.tasks.filter(t => t.project === p && t.status !== 'done').length;   // OPEN tasks only
  const rows = projs.length ? projs.map((p, i) => {
    const n = count(p);
    return `<div style="display:flex;align-items:center;gap:8px;margin-top:6px;font-size:13px">
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p)}</span>
      <span class="dim mono" style="font-size:11px">${n} task${n === 1 ? '' : 's'}</span>
      ${n === 0
        ? `<button class="btn" style="padding:2px 8px;color:var(--accent)" onclick="deleteProject(${i})" title="Delete empty project">✕</button>`
        : `<span class="dim" style="font-size:10px">in use</span>`}
    </div>`;
  }).join('') : '<div class="dim" style="font-size:12px">No projects yet.</div>';
  return `<div class="card"><h2>Projects</h2>
    <div class="dim" style="font-size:11px;margin-bottom:6px">Add or remove project files. Only empty projects (0 tasks) can be deleted — move a project's tasks elsewhere first.</div>
    ${rows}
    <div style="display:flex;gap:6px;margin-top:12px">
      <input id="newproj" placeholder="new project name" style="flex:1">
      <button class="btn primary" onclick="addProject()">Add</button>
    </div>
  </div>`;
}
async function addProject(){
  const inp = document.getElementById('newproj');
  const name = (inp?.value || '').trim();
  if (!name) return;
  if (distinctProjects().some(p => p.toLowerCase() === name.toLowerCase())) { toast('Project already exists'); return; }
  const reg = projectRegistry(); reg.push(name);
  const {error} = await db.from('lifeos_settings').upsert({key: 'projects', value: JSON.stringify(reg)});
  if (error) { toast('Save failed: ' + error.message); return; }
  toast('Project added: ' + name); loadAll();
}
async function deleteProject(idx){
  const name = distinctProjects()[idx]; if (!name) return;
  if (S.tasks.some(t => t.project === name && t.status !== 'done')) { toast('Not empty — move its open tasks first'); return; }
  const reg = projectRegistry().filter(p => p !== name);
  const {error} = await db.from('lifeos_settings').upsert({key: 'projects', value: JSON.stringify(reg)});
  if (error) { toast('Delete failed: ' + error.message); return; }
  toast('Project deleted: ' + name); loadAll();
}
function toggleBionic(){ S.bionic = !S.bionic; localStorage.setItem('bionic', S.bionic ? '1' : '0'); render(); }
async function saveWakeGate(v){
  const {error} = await db.from('lifeos_settings').upsert({key: 'wake_gate', value: v});
  if (error) { toast('Save failed: ' + error.message); return; }
  (S.settings = S.settings || {}).wake_gate = v;
  toast('Wake gate → ' + v.toUpperCase()); render();
}

/* ================= PWA ================= */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
