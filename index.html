<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0B0C10">
<link rel="manifest" href="manifest.webmanifest">
<title>LifeOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23E1251B'/></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#0B0C10; --card:#161923; --card2:#1E222E; --line:#272C39;
  --text:#EEF0F5; --dim:#8A90A0;
  --accent:#E1251B; --accent-hi:#FF4D42;
  --grad:linear-gradient(135deg,#FF4D42,#E1251B);
  --glow:0 4px 18px rgba(225,37,27,.35);
  --deep:#818CF8; --focus:#FBBF24; --light:#6EE7B7; --parallel:#C4B5FD;
  --done:#4ADE80;
  --mono:'Consolas','SF Mono',ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;touch-action:pan-y;overscroll-behavior-x:none;height:100%;overflow:hidden}
body{overflow:hidden;height:100%;overflow-x:clip}
/* content is its own scroller: rubber-band bounce stays INSIDE it, nav never moves */
#app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:600px;margin:0 auto;width:100%}
#app header{flex:0 0 auto;padding-left:14px;padding-right:14px}
main#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding:0 12px calc(132px + env(safe-area-inset-bottom))}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  font-size:15px;line-height:1.5;touch-action:pan-y;overscroll-behavior-x:none;
  background-image:radial-gradient(1100px 480px at 50% -8%,rgba(225,37,27,.06),transparent 60%)}
nav,.chips,.chiprow{touch-action:pan-x}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
nav button,.schip,.btn,.tstart{transition:color .15s,border-color .15s,box-shadow .15s,transform .1s}
nav button:active,.schip:active,.btn:active,.tstart:active{transform:scale(.96)}
::selection{background:rgba(225,37,27,.4)}
/* 16px floor: anything smaller makes iOS Safari auto-zoom ~110% on focus — and it sticks */
input,select,textarea{font:inherit;font-size:16px;color:var(--text);background:#12141C;border:1px solid var(--line);
  border-radius:12px;padding:9px 12px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent-hi);box-shadow:0 0 0 3px rgba(225,37,27,.18)}
a{color:var(--light)}
.mono{font-family:var(--mono)}
.dim{color:var(--dim)}
main{touch-action:pan-y;display:block}

/* header */
header{display:flex;align-items:baseline;justify-content:space-between;padding:16px 2px 10px}
header h1{font-family:var(--mono);font-size:19px;font-weight:800;letter-spacing:1px}
header h1 .dot{color:var(--accent);text-shadow:0 0 14px rgba(225,37,27,.8)}
#streakChip{font-family:var(--mono);font-size:12px;color:var(--dim);border:1px solid var(--line);
  border-radius:999px;padding:3px 10px;background:rgba(255,255,255,.03)}
#streakChip b{color:var(--text)}
#pushBtn{background:none;border:none;font-size:14px;cursor:pointer;opacity:.35;padding:2px 4px}
#pushBtn.on{opacity:1}

/* nav — bottom tab bar, Instagram-style, scrolls sideways */
nav{position:fixed;bottom:0;left:0;right:0;z-index:45;display:flex;gap:4px;overflow-x:auto;
  background:rgba(11,12,16,.82);border-top:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{font-family:var(--mono);font-size:12px;letter-spacing:.5px;padding:10px 14px;border-radius:12px;
  color:var(--dim);border:1px solid transparent;white-space:nowrap;flex:0 0 auto}
nav button.on{color:#fff;background:var(--grad);box-shadow:var(--glow)}
nav button.on::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;
  background:#fff;margin-right:6px;vertical-align:1px}

/* cards */
.card{background:linear-gradient(180deg,#191D28,#141721);border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:14px;margin-bottom:12px;
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 10px 26px rgba(0,0,0,.35)}
.card h2{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--dim);
  text-transform:uppercase;margin-bottom:9px}
.starthere{border-left:3px solid var(--accent);
  background:linear-gradient(90deg,rgba(225,37,27,.10),transparent 45%),linear-gradient(180deg,#191D28,#141721)}
.starthere .task-name{font-size:16px;font-weight:600}

/* energy bar */
.ebar{display:flex;height:12px;border-radius:6px;overflow:hidden;background:#12141C;margin:6px 0 4px;
  box-shadow:0 1px 3px rgba(0,0,0,.45) inset}
.ebar div{height:100%}
.elegend{display:flex;gap:12px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--dim)}
.elegend i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px}

/* filter chips */
.chips{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.chips button{font-family:var(--mono);font-size:11px;padding:6px 11px;border-radius:999px;
  border:1px solid var(--line);color:var(--dim);white-space:nowrap;background:rgba(255,255,255,.02)}
.chips button.on{color:#0B0C10;font-weight:700}

/* task rows */
.trow{display:flex;align-items:flex-start;gap:10px;background:linear-gradient(180deg,#181C26,#141720);
  border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:11px;margin-bottom:7px;position:relative;overflow:hidden}
.trow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--rail,var(--line))}
.tcircle{flex:0 0 auto;width:24px;height:24px;border-radius:50%;border:2px solid var(--dim);margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tcircle.done{border-color:var(--done);color:var(--done);box-shadow:0 0 10px rgba(74,222,128,.25)}
.tcircle.partial{border-color:var(--focus);color:var(--focus)}
.tbody{flex:1;min-width:0}
.tname{word-wrap:break-word}
.trow.isdone .tname{color:var(--dim);text-decoration:line-through}
.tmeta{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
/* per-task start button — right edge, far from the complete-circle on the left */
.tstart{flex:0 0 auto;width:38px;height:38px;border-radius:12px;border:1px solid var(--line);
  background:rgba(255,255,255,.02);color:var(--done);font-size:15px;margin-left:10px;cursor:pointer;align-self:center}
.tstart.on{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px rgba(225,37,27,.3)}
/* 3-layer: goal rows + nested children */
details.goal{margin-bottom:6px}
details.goal>summary{list-style:none;cursor:pointer}
details.goal>summary::-webkit-details-marker{display:none}
.gprog{flex:0 0 auto;font-family:var(--mono);font-size:11px;border:1px solid var(--line);
  border-radius:10px;padding:4px 7px;color:var(--dim);margin-top:1px}
.gprog.alldone{border-color:var(--done);color:var(--done)}
.gkids{margin:2px 0 4px 14px;border-left:2px solid var(--line);padding-left:8px}
/* plan editor rows */
.prow{display:flex;align-items:center;gap:6px;padding:6px 2px;border-bottom:1px solid var(--line);font-size:13px}
.pdrag{touch-action:none;cursor:grab;color:var(--dim);padding:4px 10px;font-size:17px;flex:0 0 auto}
.prow .schip{flex:0 0 auto}
/* plan blocks on calendar grids (dashed = AI/suggestion, solid+📌 = locked) */
.pblk{position:absolute;left:52px;right:4px;border:1.5px dashed;border-radius:8px;font-size:10px;
  padding:2px 6px;overflow:hidden;background:rgba(11,12,16,.72);z-index:5;cursor:grab;
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.pblk.locked{border-style:solid;background:rgba(255,255,255,.08);
  box-shadow:0 2px 10px -3px currentColor}
.wk-col .pblk{left:1px;right:1px;font-size:9px;padding:1px 3px}
/* scrollable 24h grid wrapper — opens at 6 AM, scroll up for 12 AM–6 AM */
.gridwrap{max-height:62vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  touch-action:pan-y;transform:translateZ(0);will-change:scroll-position;
  border:1px solid rgba(255,255,255,.07);border-radius:14px}
/* touches on the grid body commit to vertical scroll immediately; horizontal
   goes to JS (day paging) and blocks handle their own hold-drag */
.gridwrap .daygrid,.gridwrap .wk-grid,.gridwrap .wk-col{touch-action:pan-y}
.tmeta .due-today{color:var(--focus)}
.tmeta .overdue{color:var(--accent)}
.tmeta .hard{color:var(--accent)}
.pname{font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--dim);margin:14px 2px 6px;text-transform:uppercase}

/* editor */
.editor{background:#12141C;border-top:1px solid var(--line);margin:10px -14px -14px;padding:12px 14px 14px;
  border-radius:0 0 15px 15px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.editor .full{grid-column:1/-1}
.editor label{font-family:var(--mono);font-size:10px;color:var(--dim);display:block;margin-bottom:2px;text-transform:uppercase}
.editor .btnrow{grid-column:1/-1;display:flex;gap:8px;justify-content:flex-end}
.btn{padding:9px 16px;border-radius:11px;border:1px solid var(--line);font-family:var(--mono);font-size:12px;
  background:rgba(255,255,255,.02)}
.btn.primary{background:var(--grad);border-color:transparent;color:#fff;font-weight:700;box-shadow:var(--glow)}
.btn.danger{color:var(--accent-hi)}

/* add bar — sits ABOVE the bottom nav */
#addbar{position:fixed;bottom:calc(54px + env(safe-area-inset-bottom));left:0;right:0;z-index:44;
  background:rgba(11,12,16,.82);border-top:1px solid rgba(255,255,255,.06);
  padding:8px 12px;backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5)}
#addbar .inner{max-width:576px;margin:0 auto}
#esel{display:flex;gap:6px;margin-bottom:6px}
#esel button{flex:1;font-family:var(--mono);font-size:11px;font-weight:700;padding:6px 0;border-radius:10px;
  border:1px solid var(--line);color:var(--dim)}
#esel button.on{color:#0B0C10}
#addrow{display:flex;gap:6px}
#addrow input{flex:1}
#addrow .btn{flex:0 0 auto;background:var(--grad);border-color:transparent;color:#fff;font-weight:700}
#addhint{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:4px}

/* reflect */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-grid label{font-family:var(--mono);font-size:10px;color:var(--dim);display:block;margin-bottom:2px;text-transform:uppercase}
.metric-grid .full{grid-column:1/-1}
.goalrow{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line)}
.goalrow:last-child{border-bottom:none}
.goalrow input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent)}
.goalrow .g-meta{font-family:var(--mono);font-size:11px;color:var(--dim);margin-left:auto}
#scorePreview{font-family:var(--mono);font-size:34px;font-weight:800;text-align:center;padding:8px;letter-spacing:-1px}
#scorePreview small{display:block;font-size:11px;color:var(--dim);font-weight:400;letter-spacing:0}

/* brief markdown */
.md h1,.md h2,.md h3{font-family:var(--mono);margin:14px 0 6px;font-size:15px}
.md h1{font-size:17px}
.md h2{color:var(--accent-hi)}
.md p,.md ul,.md ol{margin-bottom:8px}
.md ul,.md ol{padding-left:20px}
.md code{font-family:var(--mono);background:var(--card2);padding:1px 4px;border-radius:4px;font-size:13px}
.md strong{color:#fff}

/* log */
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
th,td{text-align:left;padding:5px 6px;border-bottom:1px solid var(--line)}
th{color:var(--dim);font-weight:400;text-transform:uppercase;font-size:10px}
.hit{color:var(--done)} .miss{color:var(--accent)} .rest{color:var(--dim)}

/* chat */
#chatlog{display:flex;flex-direction:column;gap:8px;min-height:40vh;max-height:60vh;overflow-y:auto;margin-bottom:10px;padding:2px}
.msg{max-width:86%;padding:10px 13px;border-radius:18px;font-size:14px;line-height:1.45;overflow-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--grad);color:#fff;border-bottom-right-radius:5px;box-shadow:0 4px 14px rgba(225,37,27,.25)}
.msg.bot{align-self:flex-start;background:linear-gradient(180deg,#191D28,#141721);border:1px solid rgba(255,255,255,.06);border-bottom-left-radius:5px}
.msg.bot p{margin:0 0 6px}.msg.bot p:last-child{margin:0}
.msg.bot ul,.msg.bot ol{margin:0 0 6px;padding-left:18px}
.msg.bot code{font-family:var(--mono);background:var(--card2);padding:1px 4px;border-radius:4px;font-size:12px}
#chatrow{display:flex;gap:6px}
.typing{color:var(--dim);font-family:var(--mono);font-size:12px;align-self:flex-start;padding:6px 2px}

/* brief accordion */
details.bsec{background:linear-gradient(180deg,#191D28,#141721);border:1px solid rgba(255,255,255,.06);border-radius:14px;margin-bottom:8px;overflow:hidden}
details.bsec summary{cursor:pointer;padding:12px;font-family:var(--mono);font-size:11px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;color:var(--text);list-style:none;display:flex;
  justify-content:space-between;align-items:center;user-select:none}
details.bsec summary::-webkit-details-marker{display:none}
details.bsec summary::after{content:'+';color:var(--dim);font-size:15px}
details.bsec[open] summary::after{content:'\2212'}
details.bsec>.md{padding:0 12px 12px}
details.bsec.hot summary{border-left:3px solid var(--accent);padding-left:9px}
details.bsec>.ginner{padding:0 10px 10px}
.md li{margin:3px 0}
.md{line-height:1.55}
.bio b{font-weight:700;color:#fff}

/* add-task sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:50;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:linear-gradient(180deg,#1A1E29,#12141C);border:1px solid rgba(255,255,255,.08);
  border-radius:22px 22px 0 0;padding:12px 16px 16px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;
  box-shadow:0 -12px 40px rgba(0,0,0,.5)}
.sheet::before{content:'';display:block;width:36px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px}
.sheet h2{font-family:var(--mono);font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.sheet label{display:block;font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;margin:12px 0 6px}
.chiprow{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.chiprow.wrap{flex-wrap:wrap;overflow:visible}
.schip{font-family:var(--mono);font-size:12px;padding:7px 13px;border-radius:999px;border:1px solid var(--line);color:var(--dim);white-space:nowrap;flex:0 0 auto;background:rgba(255,255,255,.02);cursor:pointer}
.schip.on{background:var(--text);border-color:var(--text);color:#0B0C10;font-weight:700}
.cal{margin-top:10px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px}
.cal-h{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:12px;margin-bottom:8px}
.cal-h button{padding:4px 14px;color:var(--dim);font-size:16px;border:1px solid var(--line);border-radius:999px;
  background:rgba(255,255,255,.02)}
.cal-h button:active{color:var(--text);border-color:var(--dim)}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-g .dow{text-align:center;font-family:var(--mono);font-size:9px;color:var(--dim)}
.cal-d{position:relative;aspect-ratio:1;border-radius:10px;font-size:12px;color:var(--text);border:1px solid transparent;background:none}
.cal-d.today{border-color:var(--dim)}
.cal-d.sel{background:var(--grad);color:#fff;font-weight:700;box-shadow:0 2px 10px rgba(225,37,27,.35)}
.cal-d i{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);font-style:normal;font-size:8px;color:var(--focus)}
.cal-d.sel i{color:#fff}

/* full calendar tab */
.cal-d.big{aspect-ratio:auto;min-height:48px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:4px;cursor:pointer}
.cal-d.big .marks{display:flex;gap:2px;margin-top:3px;align-items:center}
.cal-d.big .marks i{position:static;transform:none;width:5px;height:5px;border-radius:50%;display:block}
.cal-d.big .marks em{font-size:9px;color:var(--dim);font-style:normal;line-height:1}

/* month view — google-style titled chips */
.mo-cell{position:relative;min-height:68px;border:1px solid transparent;border-radius:10px;padding:2px 1px;
  display:flex;flex-direction:column;gap:1px;background:none;cursor:pointer;min-width:0;text-align:left}
.mo-cell.selq{border-color:rgba(255,255,255,.12);background:var(--card2);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.mo-d{font-size:11px;align-self:center;width:20px;height:20px;line-height:20px;text-align:center;border-radius:50%;margin-bottom:1px;color:var(--text)}
.mo-cell.today .mo-d{background:var(--grad);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(225,37,27,.35)}
.mo-chip{font-size:8px;line-height:1.3;padding:1px 3px;border-left:2px solid;border-radius:3px;
  background:rgba(255,255,255,.05);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);max-width:100%}
.mo-more{font-size:8px;color:var(--dim);font-family:var(--mono);padding-left:2px}

/* flashcards */
.fc-front{font-size:17px;line-height:1.5;margin:10px 0}
.fc-back{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);line-height:1.5}

/* calendar events */
.evrow{display:flex;gap:10px;align-items:baseline;background:linear-gradient(180deg,#181C26,#141720);
  border:1px solid rgba(255,255,255,.05);border-left:3px solid var(--dim);border-radius:12px;padding:9px 11px;margin-bottom:6px;font-size:13px}
.evrow .mono{color:var(--dim);font-size:11px;white-space:nowrap}
.evb{position:absolute;top:2px;right:4px;font-size:8px;color:var(--dim);font-weight:400;font-style:normal;font-family:var(--mono)}

/* day view timeline */
.daygrid{position:relative;background:#101219;border:1px solid rgba(255,255,255,.05);border-radius:14px;overflow:hidden;margin-top:8px}
.hrow{position:absolute;left:0;right:0;border-top:1px solid var(--line);opacity:.35}
.hrow span{position:absolute;top:1px;left:4px;font-family:var(--mono);font-size:9px;color:var(--dim);
  background:#101219;padding:0 3px;border-radius:4px;opacity:1}
.evblk{position:absolute;left:52px;right:8px;
  background:linear-gradient(180deg,rgba(225,37,27,.20),rgba(225,37,27,.10));
  border:1px solid rgba(225,37,27,.45);border-left:3px solid var(--accent);border-radius:8px;
  padding:2px 8px;font-size:12px;overflow:hidden;z-index:1;
  box-shadow:0 2px 8px rgba(0,0,0,.25)}
.evblk:active{filter:brightness(1.25)}
.evblk b{font-family:var(--mono);font-size:10px;font-weight:600;color:#FF9B94;display:block}
.nowline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent-hi),var(--accent) 60%,transparent);z-index:2}
.nowline::before{content:'';position:absolute;left:46px;top:-3px;width:8px;height:8px;border-radius:50%;
  background:var(--accent-hi);box-shadow:0 0 8px rgba(255,77,66,.8)}

/* compact event/task lines (day-peek in add sheet) */
.wkline{font-size:12px;padding:2px 0;display:flex;gap:8px;align-items:center}
.wkline .mono{color:var(--dim);font-size:10px;min-width:42px}
.wkline i{width:6px;height:6px;border-radius:50%;flex:0 0 auto;display:inline-block}
.wkline.dim{color:var(--dim)}

/* week grid (google-style) */
.wk-head{display:flex;margin-bottom:2px}
.wk-gutter{flex:0 0 30px}
.wk-col-h{flex:1;text-align:center;background:none;padding:4px 0;border-radius:10px;position:relative;min-width:0}
.wk-col-h .wd{display:block;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px}
.wk-col-h .dn{display:block;font-size:15px;margin-top:2px;font-weight:600}
.wk-col-h.now .dn{background:var(--grad);color:#fff;border-radius:50%;width:26px;height:26px;line-height:26px;margin:2px auto 0;box-shadow:0 2px 8px rgba(225,37,27,.4)}
.wk-col-h .td{position:absolute;top:2px;right:3px;font-style:normal;font-size:8px;color:var(--focus);font-family:var(--mono)}

.wk-ad-cell{flex:1;min-width:0;padding:0 1px}
.wk-banner{background:linear-gradient(180deg,rgba(129,140,248,.30),rgba(129,140,248,.16));

  padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wk-banner.more{background:none;color:var(--dim)}
.wk-grid{position:relative;display:flex;background:#101219;border:1px solid rgba(255,255,255,.05);border-radius:14px;overflow:hidden;padding-left:30px}
.wk-rail{position:absolute;inset:0;pointer-events:none}
.wk-rail .hrow span{left:4px;font-size:8px}
.wk-col{flex:1;position:relative;border-left:1px solid rgba(255,255,255,.04);min-width:0;cursor:pointer}

/* auth */

#auth .card{padding:20px}
#auth input{margin-bottom:10px}
#authmsg{font-family:var(--mono);font-size:12px;color:var(--focus);margin-top:8px;min-height:16px}
.hidden{display:none!important}
#toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(30,34,46,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:9px 18px;font-family:var(--mono);font-size:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.45);opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
#toast.show{opacity:1}
.empty{color:var(--dim);font-family:var(--mono);font-size:12px;text-align:center;padding:20px}
</style>

<body>

<div id="auth">
  <div class="card">
    <h1 style="font-family:var(--mono);margin-bottom:14px">LifeOS<span style="color:var(--accent)">.</span></h1>
    <input id="a-email" type="email" placeholder="email" autocomplete="username">

      </div>
    </div>

</div>
<div id="toast"></div>
<div id="sheetroot"></div>

<script>
/* ================= CONFIG — the ONLY three lines a new user changes ==== */
/* (setting up your own LifeOS? See SETUP.md in this repo — Claude does it) */
const SB_URL = 'https://xebiaoycxwstrzgkjult.supabase.co';   // your Supabase project URL
const SB_KEY = 'sb_publishable_ecGABp0TAZcVX_TLIjBbOQ_rqUKNATw'; // your publishable key
const OWNER  = 'skyler.scooty@gmail.com';                    // your email, lowercase
const GCAL_CLIENT_ID = '118493693943-6l9gncbacaip7d4fct7cgdkr5l51nm1j.apps.googleusercontent.com'; // optional: live Google Calendar (blank = use routine sync only)
const VAPID_PUBLIC = 'BIV0Jfwa19Q54frhQNxbdR2a8dN6Bw9zCSd_SPIXEeD2YFZbtX6YU3gVcH6bnbD3JHcxmNkXt_nDH2lpO3LDEVk'; // push notifications (GET /functions/v1/notify shows yours)
const CLAUDE_URL = 'https://claude.ai/project/019f2ae4-de05-714c-8cf0-3bd5d2b1b335'; // lifeOS Project — deep-brainstorm escape hatch in CHAT
const db = window.supabase.createClient(SB_URL, SB_KEY);

const ENERGY = {
  DEEP:    {color:'var(--deep)',     hex:'#818CF8', score:3},
  FOCUS:   {color:'var(--focus)',    hex:'#FBBF24', score:2},
  LIGHT:   {color:'var(--light)',    hex:'#6EE7B7', score:1},
  PARALLEL:{color:'var(--parallel)', hex:'#C4B5FD', score:1},
};
const PRIO = {high:3, med:2, low:1};

/* ================= state ================= */
let S = {
  tasks: [], goals: [], goalLogsToday: [], brief: null, todayLog: null, prevLog: null,
  view: localStorage.getItem('view') || 'today',
  filt: localStorage.getItem('filt') || 'ALL',
  addEnergy: localStorage.getItem('addEnergy') || 'FOCUS',
  showBacklog: false, search: '', editing: null, editMode: false,
  chat: JSON.parse(localStorage.getItem('chatHistory') || '[]'), sending: false,
  sheet: null, expandAll: false, openGroups: new Set(),
  bionic: localStorage.getItem('bionic') === '1',
  cards: [], showBack: false, calY: null, calM: 0, calSel: null,

  gcalEvents: [], gcalRange: null, gcalLive: false, gcalLoading: false,
};

// "today" = the CREDIT DAY (resets 6 AM, not midnight) so score/streak/done don't roll over overnight
const todayISO = () => { const d = new Date(); d.setHours(d.getHours() - 6); return d.toLocaleDateString('sv-SE'); };
const esc = s => (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const toast = m => { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); };

/* ================= auth ================= */
async function signIn(){
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  const {error} = await db.auth.signInWithPassword({email, password: pass});
  document.getElementById('authmsg').textContent = error ? error.message : '';
}
async function signUp(){
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  if (email.toLowerCase() !== OWNER) { document.getElementById('authmsg').textContent = 'Single-user system.'; return; }
  if (pass.length < 8) { document.getElementById('authmsg').textContent = 'Password: 8+ chars.'; return; }
  const {error} = await db.auth.signUp({email, password: pass});
  document.getElementById('authmsg').textContent = error ? error.message : 'Check your email to confirm, then sign in.';
}
db.auth.onAuthStateChange((_e, session) => {
  document.getElementById('auth').style.display = session ? 'none' : 'block';
  document.getElementById('app').classList.toggle('hidden', !session);
  if (session) loadAll();
});
document.getElementById('a-email').value = OWNER;

/* ================= data ================= */
async function loadAll(){
  const today = todayISO();
  const [t, g, gl, b, dl, cd, ev, fz, fs, cr, pb, st, tt, dload, scn, wh] = await Promise.all([
    db.from('tasks').select('*').order('due', {ascending:true, nullsFirst:false}),
    db.from('weekly_goals').select('*').eq('active', true).order('sort'),
    db.from('goal_logs').select('*').eq('date', today),
    db.from('briefs').select('*').eq('date', today).maybeSingle(),
    db.from('daily_log').select('*').order('date', {ascending:false}).limit(90),
    db.from('cards').select('*').lte('due', today).eq('suspended', false).order('due').limit(50),
    db.from('events').select('*').order('date').limit(300),
    db.from('freezes').select('*').gte('end_date', today).order('start_date'),
    db.from('focus_sessions').select('*').is('ended_at', null).order('started_at', {ascending: false}).limit(1),
    db.rpc('lifeos_credits'),
    db.from('plan_blocks').select('*').gte('date', today).order('date').order('start_min'),
    db.from('lifeos_settings').select('key,value'),
    db.from('timetree_events').select('*').limit(500),
    db.from('day_load').select('*').gte('date', today).order('date').limit(3),
    db.rpc('lifeos_score', {d: today}),
    db.rpc('lifeos_week_health'),
  ]);
  S.tasks = t.data || []; S.goals = g.data || []; S.goalLogsToday = gl.data || [];
  S.cards = cd.data || []; S.events = ev.data || []; S.freezes = fz.data || [];
  S.brief = b.data || null;
  S.focusOpen = (fs.data || [])[0] || null;
  S.credits = cr.data || null;
  S.planBlocks = pb.data || [];
  S.ttEvents = tt.data || [];
  S.dayLoad = (dload.data || []).find(r => r.date === today) || (dload.data || [])[0] || null;
  S.scoreNow = scn.data || null;   // C7: server is the ONLY score implementation
  S.weekHealth = wh.data || null;  // C4: "am I okay this week" (server-computed)
  S.settings = Object.fromEntries((st.data || []).map(r => [r.key, r.value]));
  try { S.wakeTargets = JSON.parse(S.settings.wake_targets || '{}'); } catch(e){ S.wakeTargets = {}; }
  const logs = dl.data || [];
  S.todayLog = logs.find(l => l.date === today) || null;
  S.prevLog  = logs.find(l => l.date < today) || null;
  S.logs = logs;
  render();
  subscribeRealtime();
  captureWake();
  updatePushBtn();
  refreshPushSub();
  // previously-connected Google Calendar: refresh the token silently
  if (localStorage.getItem('gconn') === '1' && !gcalToken()) setTimeout(() => gcalConnect(true), 800);
}

/* auto-capture wake time: first app open of the day, morning window only */
async function captureWake(){
  const today = todayISO();
  if (localStorage.getItem('wakeStamped') === today) return;
  if (S.todayLog?.wake_time) { localStorage.setItem('wakeStamped', today); return; }
  const now = new Date(), h = now.getHours();
  if (h < 4 || h >= 13) return; // opening the app at 3 AM or 8 PM is not "waking up"
  const hhmm = String(h).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  S.lastWrite = Date.now();
  const {error} = await db.from('daily_log').upsert({date: today, wake_time: hhmm}, {onConflict: 'date'});
  if (!error) {
    localStorage.setItem('wakeStamped', today);
    if (S.todayLog) S.todayLog.wake_time = hhmm; else S.todayLog = {date: today, wake_time: hhmm};
    toast('Wake captured: ' + hhmm);
  }
}

/* ================= push notifications ================= */
const frozenToday = () => (S.freezes || []).some(f => f.start_date <= todayISO() && todayISO() <= f.end_date);
function urlB64ToU8(s){
  const pad = '='.repeat((4 - s.length % 4) % 4);
  const raw = atob((s + pad).replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}
function pushSupported(){ return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window; }
function updatePushBtn(){
  const b = document.getElementById('pushBtn'); if (!b) return;
  b.classList.toggle('on', pushSupported() && Notification.permission === 'granted');
}
async function savePushSub(sub){
  S.lastWrite = Date.now();
  const row = { endpoint: sub.endpoint, subscription: sub.toJSON(), ua: navigator.userAgent.slice(0, 120) };
  const {error} = await db.from('push_subs').upsert(row, {onConflict: 'endpoint'});
  if (error) toast('Push save failed: ' + error.message);
  return !error;
}
async function enablePush(){
  if (!pushSupported()) {
    const ios = /iPhone|iPad/.test(navigator.userAgent);
    toast(ios ? 'iOS: install first — Share → Add to Home Screen, then open from the icon' : 'Push not supported in this browser');
    return;
  }
  const perm = await Notification.requestPermission();   // must be inside a user gesture (this click)
  if (perm !== 'granted') { toast('Notifications blocked — enable in Settings if you change your mind'); return; }
  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToU8(VAPID_PUBLIC) });
    if (await savePushSub(sub)) toast('Push enabled — brief, streak-risk + reflection nudges are live');
  } catch (e) { toast('Subscribe failed: ' + (e.message || e)); }
  updatePushBtn();
}
/* keep the stored subscription fresh (endpoints rotate) — silent, only if already granted */
async function refreshPushSub(){
  if (!pushSupported() || Notification.permission !== 'granted') return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) await savePushSub(sub);
  } catch { /* offline etc — next open */ }
}

/* ================= live sync ================= */
let rtChannel = null, rtTimer = null;
function subscribeRealtime(){
  if (rtChannel) return;
  rtChannel = db.channel('lifeos-sync')
    .on('postgres_changes', {event: '*', schema: 'public'}, () => {
      // ignore the echo of our own writes — they're already on screen
      if (Date.now() - (S.lastWrite || 0) < 2500) return;
      clearTimeout(rtTimer);
      rtTimer = setTimeout(() => {
        if (S.editing || S.sending || S.sheet || S.wakeChallenge || S.planEditMode) return;
        if (Date.now() - (S._gsAt || 0) < 1200) { clearTimeout(rtTimer); rtTimer = setTimeout(() => { if (!S.editing && !S.sheet && !S.planEditMode) loadAll(); }, 1200); return; } // don't rebuild the calendar mid-scroll
        loadAll();
      }, 600);
    })
    .subscribe();
}

/* ================= task helpers ================= */
/* local calendar day of a timestamptz — NOT the UTC slice. Tasks finished after
   7 PM CT used to land on "tomorrow" because toISOString() is UTC. */
const localDay = ts => { if (!ts) return ''; const d = new Date(ts); d.setHours(d.getHours() - 6); return d.toLocaleDateString('sv-SE'); };  // credit-day (6 AM) bucket
const isDoneToday = t => t.status === 'done' && localDay(t.completed_at) === todayISO();
const isPartialToday = t => t.partial_date === todayISO();
const dueTag = t => {
  if (!t.due) return '';
  const today = todayISO();
  if (t.due < today && t.status !== 'done') return `<span class="overdue">overdue ${esc(t.due.slice(5))}</span>`;
  if (t.due === today) return `<span class="due-today">due today</span>`;
  return `<span>due ${esc(t.due.slice(5))}</span>`;
};
const chunkTag = t => t.chunk_total ? ` (${t.chunk_index}/${t.chunk_total})` : '';

async function cycleTask(id){
  const t = S.tasks.find(x => x.id === id); if (!t) return;
  let patch;
  if (t.status === 'done')            patch = {status:'in_progress', completed_at:null, partial_date:todayISO()};
  else if (isPartialToday(t))         patch = {status:'not_started', completed_at:null, partial_date:null};
  else                                patch = {status:'done', completed_at:new Date().toISOString(), partial_date:null};
  Object.assign(t, patch);
  // patch just this row in place — no full re-render, no flicker.
  // Children re-render fully so the goal's n/m progress + confirm card update
  // (render() preserves scroll, so no jump).
  const node = document.getElementById('t-' + id);
  if (t.parent_id) render();
  else if (node) { const tmp = document.createElement('div'); tmp.innerHTML = taskRowHTML(t); node.replaceWith(tmp.firstElementChild); }
  else render();
  S.lastWrite = Date.now();
  const {error} = await db.from('tasks').update(patch).eq('id', id);
  if (error) { toast('Save failed: ' + error.message); loadAll(); }
}

/* quick-add parsing: #project !prio 90m/1.5h due:tom hard */
function parseQuickAdd(raw){
  let title = raw, out = {energy: S.addEnergy, bucket: (S.view === 'tasks' && S.showBacklog) ? 'backlog' : 'active'};
  const grab = (re, fn) => { const m = title.match(re); if (m) { fn(m); title = title.replace(re, ''); } };
  grab(/#(\S+)/,        m => out.project = m[1].replace(/-/g,' '));
  grab(/!(high|med|low)\b/i, m => out.priority = m[1].toLowerCase());
  grab(/\b(\d+(?:\.\d+)?)h\b/i, m => out.est_minutes = Math.round(parseFloat(m[1]) * 60));
  grab(/\b(\d+)m\b/i,   m => out.est_minutes = parseInt(m[1]));
  grab(/\bdue:(\S+)/i,  m => {
    const v = m[1].toLowerCase(); const d = new Date();
    if (v === 'today') out.due = todayISO();
    else if (v === 'tom' || v === 'tomorrow') { d.setDate(d.getDate()+1); out.due = d.toLocaleDateString('sv-SE'); }
    else if (/^\d{4}-\d{2}-\d{2}$/.test(v)) out.due = v;
  });
  grab(/\bhard\b/i, () => out.deadline_type = 'hard');
  if (out.due && !out.deadline_type) out.deadline_type = 'self_imposed';
  out.title = title.replace(/\s+/g,' ').trim();
  return out;
}
function addTask(){
  const inp = document.getElementById('addinput');
  const parsed = parseQuickAdd(inp.value);
  if (!parsed.title) return;
  inp.value = '';
  const now = new Date();
  S.sheet = {
    title: parsed.title, energy: parsed.energy, est: parsed.est_minutes || null,
    project: parsed.project || null, due: parsed.due || null,
    priority: parsed.priority || 'med', deadline_type: parsed.deadline_type || null,
    bucket: parsed.bucket, calY: now.getFullYear(), calM: now.getMonth(),
  };
  render();
}
async function saveSheet(){
  const sh = S.sheet;
  const title = (document.getElementById('sh-title')?.value || sh.title || '').trim();
  if (!title) return;
  const row = {
    title, energy: sh.energy, est_minutes: sh.est, project: sh.project, due: sh.due,
    priority: sh.priority, deadline_type: sh.deadline_type || (sh.due ? 'self_imposed' : null),
    parallel: sh.energy === 'PARALLEL', bucket: sh.bucket || 'active',
  };
  S.lastWrite = Date.now();
  // 3-layer: nest under an existing goal, or create the goal first
  let parentId = sh.parentId || null;
  if (sh.newGoal) {
    const {data: g, error: gerr} = await db.from('tasks').insert({
      title: sh.newGoal, project: sh.project, status: 'not_started',
      priority: sh.priority || 'med', bucket: sh.bucket || 'active', energy: sh.energy,
    }).select().single();
    if (gerr) { toast('Goal create failed: ' + gerr.message); return; }
    parentId = g.id;
  }
  if (parentId) row.parent_id = parentId;
  const {data, error} = await db.from('tasks').insert(row).select().single();
  if (error) { toast('Add failed: ' + error.message); return; }
  S.sheet = null; toast(parentId ? 'Added under goal' : 'Added'); loadAll();  // refetch so any auto-chunk split shows immediately
}
function projectRegistry(){ try { return JSON.parse((S.settings && S.settings.projects) || '[]'); } catch(e){ return []; } }
function distinctProjects(){ return [...new Set([...S.tasks.filter(t => t.status !== 'done').map(t => t.project).filter(Boolean), ...projectRegistry()])].sort(); }
window._projList = [];
function pickProject(i){ S.sheet.project = i < 0 ? null : window._projList[i]; S.sheet.parentId = null; S.sheet.newGoal = null; render(); }
/* goal picker: nest the new task under an existing top-level task of the project, or a brand-new goal */
window._goalList = [];
function pickGoal(i){
  if (i < 0) { S.sheet.parentId = null; S.sheet.newGoal = null; }
  else { S.sheet.parentId = window._goalList[i].id; S.sheet.newGoal = null; }
  render();
}
function newGoalForSheet(){
  const g = prompt('New goal name (the task you\'re creating becomes its first subtask):');
  if (g && g.trim()) { S.sheet.newGoal = g.trim(); S.sheet.parentId = null; render(); }
}
function newProject(){ const p = prompt('New project name:'); if (p && p.trim()) { S.sheet.project = p.trim(); render(); } }
function calNav(d){ let m = S.sheet.calM + d, y = S.sheet.calY; if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; } S.sheet.calM = m; S.sheet.calY = y; render(); }
function setDue(v){ S.sheet.due = v; render(); }
function dueIn(days){ const d = new Date(); d.setDate(d.getDate() + days); setDue(d.toLocaleDateString('sv-SE')); }
function calHTML(){
  const sh = S.sheet, y = sh.calY, m = sh.calM;
  const startDow = (new Date(y, m, 1).getDay() + 6) % 7;
  const days = new Date(y, m + 1, 0).getDate();
  const {byDay, evByDay} = calMaps(); // same data as the full CAL tab
  let cells = '';
  for (let i = 0; i < startDow; i++) cells += '<span></span>';
  for (let d = 1; d <= days; d++) {
    const iso = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const ts = byDay[iso] || [];
    const evN = (evByDay[iso] || []).length;
    const marks = ts.slice(0, 4).map(t => `<i style="background:${(ENERGY[t.energy] || {}).hex || '#666'}"></i>`).join('');
    cells += `<button class="cal-d big ${sh.due === iso ? 'sel' : ''} ${iso === todayISO() ? 'today' : ''}" onclick="setDue('${iso}')">
      ${evN ? `<em class="evb">${evN}▸</em>` : ''}<span>${d}</span><div class="marks">${marks}${ts.length > 4 ? '<em>+</em>' : ''}</div></button>`;
  }
  const mn = new Date(y, m, 1).toLocaleString('en-US', {month: 'long', year: 'numeric'});
  // peek at what's already on the selected day
  let peek = '';
  if (sh.due) {
    const evs = (evByDay[sh.due] || []).slice().sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
    const ts = byDay[sh.due] || [];
    const lines = [
      ...evs.slice(0, 3).map(e => `<div class="wkline"><span class="mono">${e.start_time ? esc(e.start_time) : 'all-day'}</span><span>${esc(e.title)}</span></div>`),
      ...ts.slice(0, 4).map(t => `<div class="wkline"><i style="background:${(ENERGY[t.energy] || {}).hex || '#666'}"></i><span>${esc(t.title)}${t.est_minutes ? ` <span class="dim">· ${t.est_minutes}m</span>` : ''}</span></div>`),
    ];
    const more = (evs.length - 3 > 0 ? evs.length - 3 : 0) + (ts.length - 4 > 0 ? ts.length - 4 : 0);
    peek = `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line)">

/* swipe left/right (touch OR mouse drag) to switch tabs — page follows the finger */
(() => {
  const mainEl = document.getElementById('main');
  let sw = null;
  const excluded = t => t && t.closest && t.closest('nav,#addbar,#sheetroot,#auth,input,textarea,select,.chips,.chiprow,.prow,.pdrag');
  document.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    if (excluded(e.target)) return;
    if (S.sheet || S.editing) return;
    sw = {x: e.clientX, y: e.clientY, t: Date.now(), active: false, tgt: e.target};
  }, {passive: true});
  document.addEventListener('pointermove', e => {
    if (!sw) return;
    if (!sw.active) {
      // instantaneous move since last event
      const ix = e.clientX - (sw.lx != null ? sw.lx : sw.x);
      const iy = e.clientY - (sw.ly != null ? sw.ly : sw.y);
      sw.lx = e.clientX; sw.ly = e.clientY;
      if (sw.hx == null) sw.hx = sw.x;
      // While the finger moves mostly vertically (scrolling), glue the horizontal
      // reference to the finger — so a later sideways move is measured fresh and a
      // tab-swipe can start EVEN mid vertical-scroll (no longer cancels on scroll).
      if (Math.abs(iy) > Math.abs(ix)) sw.hx = e.clientX;
      const hdx = e.clientX - sw.hx;
      // Activate on a dominant sideways move; tolerant of angled swipes (per-move
      // horizontal only has to beat per-move vertical, so ~15° off-axis is fine).
      if (Math.abs(hdx) > 22 && Math.abs(hdx) >= Math.abs(iy)) {
        sw.active = true;
        sw.x = e.clientX - hdx;   // anchor animation + distance origin at swipe start
        sw.y = e.clientY;         // reset vertical origin so angled swipes still pass
        sw.t = Date.now();        // reset timer so a flick after scrolling still counts
        document.body.style.userSelect = 'none';
      }
    }
    if (sw && sw.active) {
      const dx = e.clientX - sw.x;
      mainEl.style.transition = 'none';
      mainEl.style.transform = `translateX(${dx}px)`;
      mainEl.style.opacity = String(Math.max(0.4, 1 - Math.abs(dx) / 600));
    }
  }, {passive: true});
  function slideTo(ni, dir, fromX){
    const w = Math.min(window.innerWidth, 640);
    // finish sliding the current page out in the direction of travel
    mainEl.style.transition = 'transform .13s ease-in, opacity .13s ease-in';
    mainEl.style.transform = `translateX(${-dir * w}px)`;
    mainEl.style.opacity = '0';
    setTimeout(() => {
      setView(VIEWS[ni][0]);
      // place the new page just off-screen on the other side, then slide it in
      mainEl.style.transition = 'none';
      mainEl.style.transform = `translateX(${dir * w * 0.55}px)`;
      mainEl.style.opacity = '0.3';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        mainEl.style.transition = 'transform .2s cubic-bezier(.2,.8,.3,1), opacity .2s';
        mainEl.style.transform = ''; mainEl.style.opacity = '';
      }));
    }, 130);
  }
  const endSwipe = e => {
    if (!sw) return;
    if (e.type === 'pointercancel' && !e.clientX && !e.clientY) { // browser stole it and gave us nothing
      sw = null; document.body.style.userSelect = '';
      mainEl.style.transition = 'transform .18s ease, opacity .18s';
      mainEl.style.transform = ''; mainEl.style.opacity = '';
      return;
    }
    const dx = e.clientX - sw.x, dy = e.clientY - sw.y, dt = Date.now() - sw.t;
    const wasActive = sw.active, swX = sw.x; sw = null;
    document.body.style.userSelect = '';
    const snapBack = () => {
      mainEl.style.transition = 'transform .18s cubic-bezier(.2,.8,.3,1), opacity .18s';
      mainEl.style.transform = ''; mainEl.style.opacity = '';
    };
    if (!wasActive || S.sheet || S.editing) { snapBack(); return; }
    // a real drag shouldn't also count as a click on whatever's under the finger
    const kill = ev => { ev.stopPropagation(); ev.preventDefault(); };
    document.addEventListener('click', kill, {capture: true, once: true});
    setTimeout(() => document.removeEventListener('click', kill, {capture: true}), 120);
    const flick = dt < 300 && Math.abs(dx) > 35;             // quick flick
    const drag  = Math.abs(dx) > 55;                          // deliberate drag
    if ((!flick && !drag) || Math.abs(dx) < Math.abs(dy)) { snapBack(); return; }  // within ~45° counts
    // inside the calendar: swipes starting near the screen edges switch tabs
    // (BRIEF ⟷ CAL ⟷ CHAT); swipes starting in the middle page through time.
    // Note: the outermost ~20px belong to iOS (browser back/forward) — the usable
    // tab-switch band is roughly 20-70px from either edge.
    const EDGE = 70;
    const fromEdge = swX < EDGE || swX > window.innerWidth - EDGE;
    if (S.view === 'cal' && !fromEdge) {
      const dir = dx < 0 ? 1 : -1;
      const w = Math.min(window.innerWidth, 640);
      mainEl.style.transition = 'transform .13s ease-in, opacity .13s ease-in';
      mainEl.style.transform = `translateX(${-dir * w}px)`; mainEl.style.opacity = '0';
      setTimeout(() => {
        navCal(dir);
        mainEl.style.transition = 'none';
        mainEl.style.transform = `translateX(${dir * w * 0.55}px)`; mainEl.style.opacity = '0.3';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          mainEl.style.transition = 'transform .2s cubic-bezier(.2,.8,.3,1), opacity .2s';
          mainEl.style.transform = ''; mainEl.style.opacity = '';
        }));
      }, 130);
      return;
    }
    const i = VIEWS.findIndex(v => v[0] === S.view);
    const ni = i + (dx < 0 ? 1 : -1);
    if (ni < 0 || ni >= VIEWS.length) { snapBack(); return; }
    slideTo(ni, dx < 0 ? 1 : -1);
  };
  document.addEventListener('pointerup', endSwipe);
  document.addEventListener('pointercancel', endSwipe); // gesture stolen mid-drag still commits if it traveled far enough
})();
function bionicify(root){
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes = []; let n;
  while ((n = walker.nextNode())) nodes.push(n);
  nodes.forEach(node => {
    const txt = node.nodeValue;
    if (!txt.trim()) return;
    if (node.parentElement.closest('code,pre')) return;
    const span = document.createElement('span'); span.className = 'bio';
    span.innerHTML = esc(txt).replace(/[A-Za-zÀ-ɏ]{2,}/g, w => {
      const k = Math.ceil(w.length * 0.45);
      return '<b>' + w.slice(0, k) + '</b>' + w.slice(k);
    });
    node.parentNode.replaceChild(span, node);
  });
}

/* --- TODAY --- */
/* live START HERE — always points at the best thing to do RIGHT NOW.
   1) the brief's marked task while it's open → 2) current/next plan block whose
   task is open → 3) highest-priority open task due today. Recomputes on every
   render, so completing the task advances the card. */
function startHereNow(todays){
  const kids = S._kids || {};
  const byTitle = title => S.tasks.find(x => (x.title || '').toLowerCase() === (title || '').toLowerCase()
    && x.status !== 'done' && !(kids[x.id] || []).length);
  const sh = S.brief?.start_here_task ? byTitle(S.brief.start_here_task) : null;
  if (sh) return {t: sh, why: 'morning pick'};
  const n = new Date(); const nowM = n.getHours() * 60 + n.getMinutes();
  const fmt = m => { const h = Math.floor(m / 60) % 24, mm = String(m % 60).padStart(2, '0'),
    h12 = h % 12 || 12; return `${h12}:${mm} ${h < 12 ? 'AM' : 'PM'}`; };
  const blocks = (S.planBlocks || []).filter(b => b.date === todayISO() && b.kind === 'task')
    .sort((a, b) => a.start_min - b.start_min);
  for (const b of blocks){
    if (b.end_min <= nowM) continue;
    const t = (b.task_id && S.tasks.find(x => x.id === b.task_id && x.status !== 'done')) || byTitle(b.title);
    if (t) return {t, why: b.start_min <= nowM ? 'on the plan now' : 'next on the plan · ' + fmt(b.start_min)};
  }
  const open = (todays || []).filter(t => t.status !== 'done');
  if (open.length){
    const t = [...open].sort((a, b) => (PRIO[b.priority] || 2) - (PRIO[a.priority] || 2)
      || (a.est_minutes || 99) - (b.est_minutes || 99))[0];
    return {t, why: 'top of today'};
  }
  return null;
}
/* NL replan — "skipping the gym, push everything back" → edge fn `replan` →
   bounded intent → lifeos_apply_replan (SQL does all scheduling) */
function replanCardHTML(){
  return `<div class="card"><h2>Replan in words</h2>
    <div style="display:flex;gap:6px">
      <input id="replanText" placeholder="e.g. skipping the gym, only have 2 hours" ${S.replanBusy ? 'disabled' : ''}
        onkeydown="if(event.key==='Enter')doReplan()">
      <button class="btn primary" style="flex:0 0 auto" ${S.replanBusy ? 'disabled' : ''} onclick="doReplan()">${S.replanBusy ? '…' : 'GO'}</button>
    </div>
    ${S.replanMsg ? `<div class="dim" style="font-size:12px;margin-top:8px">${esc(S.replanMsg)}</div>` : ''}</div>`;
}
async function doReplan(){
  const el = document.getElementById('replanText');
  const text = (el?.value || '').trim(); if (!text) return;
  S.lastWrite = Date.now();
  S.replanBusy = true; S.replanMsg = ''; render();
  try {
    const {data: {session}} = await db.auth.getSession();
    const r = await fetch(SB_URL + '/functions/v1/replan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token},
      body: JSON.stringify({text}),
    });
    const d = await r.json();
    S.replanMsg = d.summary || d.error || ('HTTP ' + r.status);
    if (d.applied) toast('🪄 replanned');
  } catch (e) { S.replanMsg = '⚠ ' + e.message; }
  S.replanBusy = false;
  loadAll();
}
function rToday(){
  const today = todayISO();
  const kids = S._kids || {};
  const active = S.tasks.filter(t => t.bucket === 'active' && !(kids[t.id] || []).length); // goals are containers, not deck items
  const todays = active.filter(t =>
    (t.due && t.due <= today && t.status !== 'done') ||
    t.status === 'in_progress' || isPartialToday(t) || isDoneToday(t));
  const open = todays.filter(t => t.status !== 'done');
  // energy distribution
  const dist = {}; let total = 0;
  open.forEach(t => { const m = t.est_minutes || 15; dist[t.energy || 'FOCUS'] = (dist[t.energy || 'FOCUS'] || 0) + m; total += m; });
  const bar = total ? `<div class="ebar">` + Object.entries(dist).map(([e, m]) =>
      `<div style="width:${(m / total * 100).toFixed(1)}%;background:${(ENERGY[e] || {}).hex}"></div>`).join('') + `</div>
    <div class="elegend">` + Object.entries(dist).map(([e, m]) =>
      `<span><i style="background:${(ENERGY[e] || {}).hex}"></i>${e} ${Math.round(m/60*10)/10}h</span>`).join('') +
      `<span style="margin-left:auto">${Math.round(total/60*10)/10}h open</span></div>` : '';
  const shn = startHereNow(todays);
  const shCard = shn ? `<div class="card starthere"><h2>Start here <span class="dim" style="font-weight:400;text-transform:none;letter-spacing:0">· ${shn.why}</span></h2>${taskRowHTML(shn.t)}</div>` : '';
  const meter = rMeter();
  allEvents().forEach((e, i) => e._i = i);
  const todaysEv = allEvents().filter(e => e.date === today).sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
  const evCard = todaysEv.length ? `<div class="card"><h2>Calendar</h2>${todaysEv.map(e =>
    `<div class="evrow" style="margin-bottom:4px${e.gid ? ';cursor:pointer' : ''}" ${e.gid ? `onclick="openEv(${e._i})"` : ''}><span class="mono">${e.start_time ? esc(e.start_time) + (e.end_time ? '–' + esc(e.end_time) : '') : 'all-day'}</span><span>${esc(e.title)}</span></div>`).join('')}</div>` : '';
  const list = applyFilt(todays);
  const sorted = [...list].sort((a, b) =>
    (a.status === 'done') - (b.status === 'done') ||
    (a.due || '9999').localeCompare(b.due || '9999') ||
    (PRIO[b.priority] || 2) - (PRIO[a.priority] || 2));
  // plan items as startable task rows (skip ones already in the deck above)
  const planSection = (() => {
    const deckIds = new Set(todays.map(t => t.id));
    const seen = new Set(); const rows = [];
    planItems().forEach(p => {
      const key = (p.title || '').toLowerCase();
      if (!key || seen.has(key)) return; seen.add(key);
      const t = S.tasks.find(x => (x.title || '').toLowerCase() === key
        && x.status !== 'done' && !(kids[x.id] || []).length);
      if (t && !deckIds.has(t.id)) rows.push(t);
    });
    return rows.length ? `<div class="pname">FROM TODAY'S PLAN</div>` + rows.map(taskRowHTML).join('') : '';
  })();
  return wakeChallengeHTML() + goalConfirmsHTML() + shCard + meter + capacityWarnHTML() + planBlocksHTML() + replanCardHTML() + creditsCardHTML() + evCard +
    (bar ? `<div class="card"><h2>Today's energy</h2>${bar}</div>` : '') +
    chipsHTML() +
    (sorted.length ? sorted.map(taskRowHTML).join('') : `<div class="empty">Nothing on deck — add a task below or check TASKS.</div>`) +
    planSection;
}
/* overplanning brake: plan minutes vs actual free minutes before 23:30 */
function capacityWarnHTML(){
  if (frozenToday()) return '';
  // server truth: day_load (capacity engine). Falls back to the old client
  // estimate below when the row isn't there yet.
  const d = S.dayLoad;
  if (d && d.available != null){
    if (!d.planned && !d.overload) return '';
    const h = m => Math.round((m || 0) / 60 * 10) / 10;
    const pct = Math.min(Math.round((d.ratio || 0) * 100), 100);
    const col = d.status === 'over' ? 'var(--accent-hi)' : d.status === 'tight' ? 'var(--focus)' : 'var(--done)';
    return `<div class="card"${d.status === 'over' ? ' style="border-color:var(--accent)"' : ''}><h2>Capacity</h2>
      <div style="display:flex;align-items:baseline;gap:8px">
        <span class="mono" style="font-size:15px;font-weight:700">Plan ${h(d.planned)}h / Free ${h(d.available)}h</span>
        <span class="mono" style="font-size:11px;color:${col};text-transform:uppercase">${d.status}</span></div>
      <div class="ebar" style="margin-top:6px"><div style="width:${pct}%;background:${col}"></div></div>
      ${d.overload ? `<div style="color:var(--accent-hi);font-size:12px;margin-top:6px">⚠ ${esc(d.overload)}</div>` : ''}</div>`;
  }
  const doneT = new Set(S.tasks.filter(isDoneToday).map(t => (t.title || '').toLowerCase()));
  const open = planItems().filter(p => !doneT.has((p.title || '').toLowerCase()));
  const planMin = open.reduce((s, p) => s + (p.est_minutes || 15), 0);
  if (!planMin) return '';
  const n = new Date(); const nowM = n.getHours() * 60 + n.getMinutes();
  const endM = 23 * 60 + 30;
  if (nowM >= endM) return '';
  let evMin = 0;
  allEvents().filter(e => e.date === todayISO() && e.start_time).forEach(e => {
    const [sh, sm] = e.start_time.split(':').map(Number); let s = sh * 60 + sm;
    let en2 = s + 60; if (e.end_time) { const [eh, em] = e.end_time.split(':').map(Number); en2 = eh * 60 + em; }
    s = Math.max(s, nowM); if (en2 > s) evMin += en2 - s;
  });
  const freeMin = Math.max(endM - nowM - evMin, 0);
  if (planMin <= freeMin) return '';
  const h = m => Math.round(m / 60 * 10) / 10;
  return `<div class="card" style="border-color:var(--accent)"><b style="color:var(--accent)">⚠ Overplanned</b>
    <div class="dim" style="font-size:12px">Plan needs ${h(planMin)}h · only ${h(freeMin)}h free before 23:30. Cut or defer now, not at 9 PM.</div></div>`;
}

let PDrag = null;
function planDragStart(e){

  const r = row.getBoundingClientRect();
  const g = row.cloneNode(true);
  g.style.cssText += ';position:fixed;left:' + r.left + 'px;top:' + r.top + 'px;width:' + r.width + 'px;margin:0;z-index:99;pointer-events:none;background:var(--card);border:1px solid var(--accent);border-radius:8px;box-shadow:0 10px 28px rgba(0,0,0,.55)';
  document.body.appendChild(g);
  PDrag = {from: +row.dataset.pi, ghost: g, x0: e.clientX, y0: e.clientY};
  document.body.style.userSelect = 'none';
  if (navigator.vibrate) navigator.vibrate(10);
}

  PDrag.ghost.style.transform = `translate(0px, ${e.clientY - PDrag.y0}px)`;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const row = el && el.closest && el.closest('[data-pi]');
  if (!row) return;
  const to = +row.dataset.pi;
  if (to !== PDrag.from) {
    const [it] = S.planEdit.splice(PDrag.from, 1);
    S.planEdit.splice(to, 0, it);
    PDrag.from = to;
    const box = document.getElementById('planEditRows');
    if (box) box.innerHTML = planEditRowsHTML();   // rows only — no scroll jump
  }
});

function _shuffle(a){ a = a.slice(); for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
/* classify an answer so distractors can be the SAME kind (a year vs a year,
   not a year vs a name) — makes MCQ options non-obvious */
function _ansShape(s){
  s = String(s || '').trim();
  if (/^\W*\d{4}\W*$/.test(s)) return 'year';
  if (/^[\d.,\s%$/x×+-]+$/i.test(s) && /\d/.test(s)) return 'num';
  return s.split(/\s+/).length <= 2 ? 'short' : 'long';
}
/* distractors: prefer same answer-shape, then same category — harder choices */
function _mcqOpts(card){
  const shape = _ansShape(card.back), cat = card.category;
  const norm = x => String(x || '').trim().toLowerCase();
  const seen = new Set([norm(card.back)]);
  const cands = [];
  for (const c of (S.cards || [])) {
    if (c.id === card.id || !c.back) continue;
    const k = norm(c.back); if (seen.has(k)) continue; seen.add(k);
    let score = 0;
    if (_ansShape(c.back) === shape) score += 2;
    if (cat && c.category === cat) score += 1;
    cands.push({ back: c.back, score, r: Math.random() });
  }
  cands.sort((a, b) => b.score - a.score || a.r - b.r);
  const distract = cands.slice(0, 3).map(c => c.back);
  return _shuffle([card.back, ...distract]);
}
function buildWakeQuestions(){
  const pool = (S.cards || []).filter(c => c.back && c.front);
  return _shuffle(pool).slice(0, 7).map(c => {
    const options = _mcqOpts(c);
    return { front: c.front, options, answer: options.indexOf(c.back) };
  }).filter(q => q.options.length >= 2);
}

  const parts = md.split(/\n(?=## )/);
  const head = parts.length && !parts[0].startsWith('## ') ? parts.shift() : '';

  const calSec = `<details class="bsec"><summary>TODAY'S CALENDAR</summary><div style="padding:6px 8px">${briefDayCal()}</div></details>`;

/* --- YC (TimeTree, read-only) — same calendar format as CAL, but her events only --- */
/* map timetree_events -> {iso: [{date,start_time,end_time,title}]} (all-day expanded across its range) */
function ttEvByDay(){
  const map = {};
  const push = (iso, ev) => { if (iso) (map[iso] = map[iso] || []).push(ev); };
  (S.ttEvents || []).forEach(e => {
    const title = e.title || '(untitled)';
    if (e.all_day || (!e.start_ts && e.start_date)) {
      const s = e.start_date; if (!s) return;
      const startD = fromISO(s), endD = e.end_date ? fromISO(e.end_date) : null;
      if (!endD || endD <= startD) { push(s, {date:s, start_time:null, end_time:null, title}); }
      else { for (let d = new Date(startD); d < endD; d.setDate(d.getDate()+1)) {   // DTEND is exclusive for all-day
        const iso = d.toLocaleDateString('sv-SE'); push(iso, {date:iso, start_time:null, end_time:null, title}); } }
    } else if (e.start_ts) {
      const hm = x => String(x.getHours()).padStart(2,'0') + ':' + String(x.getMinutes()).padStart(2,'0');
      const s = new Date(e.start_ts);
      const en = e.end_ts ? new Date(e.end_ts) : new Date(s.getTime() + 3600000);
      const sIso = s.toLocaleDateString('sv-SE'), eIso = en.toLocaleDateString('sv-SE');
      if (sIso === eIso) {
        push(sIso, {date:sIso, start_time:hm(s), end_time:hm(en), title});
      } else {
        // spans midnight / multiple days -> split into per-day segments
        push(sIso, {date:sIso, start_time:hm(s), end_time:'24:00', title});
        let cur = new Date(s); cur.setHours(0,0,0,0); cur.setDate(cur.getDate() + 1);
        const endDay = new Date(en); endDay.setHours(0,0,0,0);
        while (cur < endDay) { push(cur.toLocaleDateString('sv-SE'), {date:cur.toLocaleDateString('sv-SE'), start_time:'00:00', end_time:'24:00', title}); cur.setDate(cur.getDate() + 1); }
        if (en.getHours() * 60 + en.getMinutes() > 0) push(eIso, {date:eIso, start_time:'00:00', end_time:hm(en), title});
      }
    }
  });
  return map;
}

  const rail = [...Array(H1-H0)].map((_,i) => `<div class="hrow" style="top:${i*PPH}px"><span>${hourLabel(H0+i).replace(' ','')}</span></div>`).join('');
  const cols = isos.map(iso => {
    const timed = (evByDay[iso] || []).filter(e => e.start_time);
    const blocks = timed.map(e => {
      const [sh,sm] = e.start_time.split(':').map(Number);
      let dur = 60; if (e.end_time) { const [eh,em] = e.end_time.split(':').map(Number); dur = Math.max(25, (eh*60+em) - (sh*60+sm)); }
      const top = Math.max(0, ((sh-H0)*60+sm) * (PPH/60)), h = Math.max(18, dur * (PPH/60));
      return `<div class="wk-ev" style="top:${top.toFixed(0)}px;height:${h.toFixed(0)}px" title="${esc(e.title)}">${esc(e.title)}</div>`;
    }).join('');
    const nowline = iso === todayISO() ? (() => { const n = new Date(); const mins = (n.getHours()-H0)*60 + n.getMinutes(); return (mins > 0 && mins < (H1-H0)*60) ? `<div class="nowline" style="top:${(mins*PPH/60).toFixed(0)}px"></div>` : ''; })() : '';
    return `<div class="wk-col ${iso === todayISO() ? 'now' : ''}" style="position:relative">${blocks}${nowline}</div>`;
  }).join('');
  return head + adRow + `<div class="gridwrap" id="gridScroll" data-h6="${6*PPH}" onscroll="S._gsPos=this.scrollTop;S._gsAt=Date.now()">
    <div class="wk-grid" style="height:${(H1-H0)*PPH}px"><div class="wk-rail">${rail}</div>${cols}</div></div>
  <div class="dim mono" style="font-size:10px;margin-top:6px">tap a day header for the day view</div>`;
}

function rTrends(){
  const logs = [...(S.logs || [])].reverse(); // chronological
  const W = 560, H = 150, P = 10;
  // score line — last 30 scored (non-rest) days
  const pts = logs.filter(l => l.score != null && !l.rest_day).slice(-30);
  const line = pts.map((l, i) => ({
    x: P + i * (W - 2*P) / Math.max(pts.length - 1, 1),
    y: H - P - (Math.min(+l.score, 100) / 100) * (H - 2*P),
    hit: l.streak_hit, d: l.date, s: +l.score,
  }));
  const y70 = H - P - 0.7 * (H - 2*P);
  const scoreSvg = line.length > 1 ? `<svg viewBox="0 0 ${W} ${H}" style="width:100%">
      <line x1="${P}" y1="${y70}" x2="${W-P}" y2="${y70}" stroke="var(--line)" stroke-dasharray="4 4"/>
      <polyline fill="none" stroke="var(--accent)" stroke-width="2" points="${line.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ')}"/>
      ${line.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="${p.hit ? '#4ADE80' : '#E1251B'}"><title>${p.d}: ${p.s}</title></circle>`).join('')}
    </svg><div class="dim mono" style="font-size:10px">green dot = streak hit · dashed line = 70</div>`
    : '<div class="empty">Not enough scored days yet — this fills in as you save reflections.</div>';
  // energy minutes done per day — last 14 days, stacked by energy
  const days = [...Array(14)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - 13 + i); return d.toLocaleDateString('sv-SE'); });
  const per = days.map(d => {
    const o = {DEEP: 0, FOCUS: 0, LIGHT: 0, PARALLEL: 0};
    S.tasks.forEach(t => { if (t.status === 'done' && localDay(t.completed_at) === d) o[t.energy || 'FOCUS'] += (t.est_minutes || 15); });
    return {d, o, total: Object.values(o).reduce((a, b) => a + b, 0)};
  });
  const max = Math.max(...per.map(p => p.total), 60);
  const BW = (W - 2*P) / 14;
  const barsSvg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%">${per.map((p, i) => {
      let y = H - P;
      return Object.entries(p.o).map(([e, m]) => {
        if (!m) return '';
        const h = (m / max) * (H - 2*P); y -= h;
        return `<rect x="${(P + i*BW + 2).toFixed(1)}" y="${y.toFixed(1)}" width="${(BW - 4).toFixed(1)}" height="${h.toFixed(1)}" fill="${ENERGY[e].hex}" rx="2"><title>${p.d} ${e}: ${Math.round(m/60*10)/10}h</title></rect>`;
      }).join('');
    }).join('')}</svg>`;
  // stats
  const wakes = logs.filter(l => l.wake_time).slice(-7);
  const wakeAvg = wakes.length ? (() => {
    const m = wakes.reduce((s, l) => { const [h, mm] = (l.wake_time || '0:0').split(':').map(Number); return s + (h || 0) * 60 + (mm || 0); }, 0) / wakes.length;
    return `${Math.floor(m/60)}:${String(Math.round(m % 60)).padStart(2, '0')}`;
  })() : '—';
  const best = Math.max(...logs.map(l => l.streak_count || 0), 0);
  const fl = logs.filter(l => l.focus);
  const focusAvg = fl.length ? (fl.reduce((s, l) => s + l.focus, 0) / fl.length).toFixed(1) : '—';
  const deep7 = per.slice(-7).reduce((s, p) => s + p.o.DEEP, 0);
  return weekHealthHTML() + `
  <div class="card"><h2>Score — last ${line.length} scored days</h2>${scoreSvg}</div>
  <div class="card"><h2>Done work by energy — 14 days</h2>${barsSvg}
    <div class="elegend" style="margin-top:6px">${Object.keys(ENERGY).map(e => `<span><i style="background:${ENERGY[e].hex}"></i>${e}</span>`).join('')}</div></div>
  <div class="card"><h2>Stats</h2><table>
    <tr><td>current streak</td><td>${S.todayLog?.streak_count ?? S.prevLog?.streak_count ?? 0}d</td></tr>
    <tr><td>best recorded streak</td><td>${best}d</td></tr>
    <tr><td>DEEP hours, last 7 days</td><td>${Math.round(deep7/60*10)/10}h</td></tr>
    <tr><td>avg wake (last ${wakes.length} logged)</td><td>${wakeAvg}</td></tr>
    <tr><td>avg focus</td><td>${focusAvg}/5</td></tr>
    <tr><td>rest days in window</td><td>${logs.filter(l => l.rest_day).length}</td></tr>
  </table></div>
  ${(() => {
    const cal = S.tasks.filter(t => t.status === 'done' && t.actual_minutes && t.est_minutes);
    if (cal.length < 3) return `<div class="card"><h2>Estimate accuracy</h2><div class="dim">Log actual minutes on done tasks (REFLECT tab) — after 3+ this shows how honest your estimates are, per energy.</div></div>`;
    const byE = {};
    cal.forEach(t => { const e = t.energy || 'FOCUS'; (byE[e] = byE[e] || []).push(t.actual_minutes / t.est_minutes); });
    const med = a => { const s = [...a].sort((x, y) => x - y); return s[Math.floor(s.length / 2)]; };
    const rows = Object.entries(byE).map(([e, rs]) => {
      const m = med(rs);
      const verdict = m > 1.25 ? 'underestimating' : (m < 0.8 ? 'overestimating' : 'calibrated');
      return `<tr><td>${e}</td><td>${rs.length}</td><td>${Math.round(m * 100)}%</td><td style="color:${m > 1.25 ? 'var(--accent)' : 'var(--dim)'}">${verdict}</td></tr>`;
    }).join('');
    return `<div class="card"><h2>Estimate accuracy — actual vs estimated</h2>
      <table><tr><th>energy</th><th>n</th><th>median actual/est</th><th></th></tr>${rows}</table>
      <div class="dim mono" style="font-size:10px;margin-top:4px">over 125% = pad your estimates for that energy</div></div>`;
  })()}`;
}

/* --- live Google Calendar (OAuth, optional) --- */
let gTokClient = null;
function gcalToken(){ const t = JSON.parse(localStorage.getItem('gtok') || 'null'); return (t && t.exp > Date.now()) ? t.token : null; }
function gcalConnect(silent){
  if (!GCAL_CLIENT_ID || !window.google?.accounts?.oauth2) { if (!silent) toast('Google auth not loaded yet — try again'); return; }
  gTokClient = gTokClient || google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events',
    callback: r => {
      if (r.access_token) {
        localStorage.setItem('gtok', JSON.stringify({token: r.access_token, exp: Date.now() + (r.expires_in - 60) * 1000}));
        localStorage.setItem('gconn', '1');
        S.gcalRange = null; render();
      }
    },
    error_callback: () => { if (!silent) toast('Google connect cancelled'); },
  });
  gTokClient.requestAccessToken({prompt: silent ? '' : undefined});
}
function gcalDisconnect(){
  if (!confirm('Disconnect Google Calendar? (Falls back to daily routine sync)')) return;
  localStorage.removeItem('gtok'); localStorage.removeItem('gconn');
  S.gcalLive = false; S.gcalRange = null; S.gcalEvents = []; S.gcalCals = null; render();
}
/* keep Google silently connected: refresh the token ~2 min before it lapses,
   so it never drops mid-session and never needs a manual re-click */
setInterval(() => {
  if (!GCAL_CLIENT_ID || localStorage.getItem('gconn') !== '1' || !window.google?.accounts?.oauth2) return;
  const t = JSON.parse(localStorage.getItem('gtok') || 'null');
  if (!t || t.exp < Date.now() + 120000) gcalConnect(true);
}, 60000);
function allEvents(){
  // hide the Google mirrors of our own locked plan blocks (they render as blocks, not events)
  const mirror = new Set((S.planBlocks || []).map(b => b.gcal_id).filter(Boolean));

    ? [...S.gcalEvents, ...(S.events || []).filter(e => e.source && e.source !== 'gcal')]
    : (S.events || []);

}

/* GCal-style press-and-drag: hold ~1/3s on a day/week grid slot, drag down to
   set duration (30-min snaps), release to open the pre-filled event sheet. */
let GD = null;
function gridPressStart(ev, iso, pph, h0){
  if (!gcalToken()) return;
  if (ev.pointerType === 'mouse' && ev.button !== 0) return;
  if (ev.target.closest && ev.target.closest('.evblk,.wk-ev')) return;   // press on an existing event = tap-to-edit, not create
  GD = {iso, pph, h0, el: ev.currentTarget, y0: ev.clientY, x0: ev.clientX, endY: ev.clientY,
        active: false, timer: setTimeout(gridDragActivate, 320)};
}
function gridDragActivate(){
  if (!GD) return;
  GD.active = true;
  document.body.style.userSelect = 'none';
  GD.rect = GD.el.getBoundingClientRect();
  GD.startH = Math.max(0, Math.floor((GD.y0 - GD.rect.top) / GD.pph * 2) / 2);
  GD.startH = Math.min(GD.startH, 24 - GD.h0 - 0.5);
  const ghost = document.createElement('div');
  ghost.style.cssText = 'position:absolute;left:2px;right:2px;border-radius:6px;background:rgba(225,37,27,.30);border:1px dashed var(--accent);z-index:6;pointer-events:none';
  ghost.style.top = (GD.startH * GD.pph) + 'px';
  ghost.style.height = (GD.pph / 2) + 'px';
  GD.el.appendChild(ghost); GD.ghost = ghost;
}
function gridDragEndH(g){
  return Math.min(24 - g.h0, Math.max(g.startH + 0.5, Math.ceil((g.endY - g.rect.top) / g.pph * 2) / 2));
}
document.addEventListener('pointermove', e => {
  if (!GD) return;
  if (!GD.active) {   // moved before the hold completed → it's a scroll/swipe, not a create
    if (Math.abs(e.clientY - GD.y0) > 10 || Math.abs(e.clientX - GD.x0) > 10) { clearTimeout(GD.timer); GD = null; }
    return;
  }

async function loadGcal(anchorISO){

  const end = new Date(a); end.setDate(a.getDate() + 62);

      if (cl.status === 401) { localStorage.removeItem('gtok'); S.gcalCals = null; S.gcalLive = false; S.gcalLoading = false;
        if (localStorage.getItem('gconn') === '1') gcalConnect(true); else render();   // silent re-auth instead of dropping
        return; }

        .map(c => ({id: c.id, name: c.summaryOverride || c.summary || c.id, primary: !!c.primary, writable: ['owner','writer'].includes(c.accessRole)}));

        {headers: {Authorization: 'Bearer ' + tok}}).then(r => r.ok ? r.json() : {items: []}).catch(() => ({items: []}))));
    const pad = n => String(n).padStart(2, '0');
    const out = [];
    ds.forEach((d, ci) => {
      const cal = S.gcalCals[ci];
      (d.items || []).forEach(ev => {
        if (ev.status === 'cancelled') return;
        const title = ev.summary || '(untitled)';

        }
