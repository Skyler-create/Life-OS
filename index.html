<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17181A">
<link rel="manifest" href="manifest.webmanifest">
<title>LifeOS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23E1251B'/></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#17181A; --card:#212327; --card2:#2A2D33; --line:#33363C;
  --text:#E8E6E3; --dim:#8B8E94;
  --accent:#E1251B;
  --deep:#818CF8; --focus:#FBBF24; --light:#6EE7B7; --parallel:#C4B5FD;
  --done:#4ADE80;
  --mono:'Consolas','SF Mono',ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;touch-action:pan-y;overscroll-behavior-x:none;min-height:100%;overflow-x:hidden}
body{overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
  max-width:600px;margin:0 auto;padding:0 12px 200px;font-size:15px;line-height:1.45;
  touch-action:pan-y;overscroll-behavior-x:none}
nav,.chips,.chiprow{touch-action:pan-x}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font:inherit;color:var(--text);background:var(--card2);border:1px solid var(--line);
  border-radius:6px;padding:8px 10px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
a{color:var(--light)}
.mono{font-family:var(--mono)}
.dim{color:var(--dim)}
main{touch-action:pan-y;display:block}

/* header */
header{display:flex;align-items:baseline;justify-content:space-between;padding:14px 2px 8px}
header h1{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:.5px}
header h1 .dot{color:var(--accent)}
#streakChip{font-family:var(--mono);font-size:12px;color:var(--dim)}
#streakChip b{color:var(--text)}

/* nav — bottom tab bar, Instagram-style, scrolls sideways */
nav{position:fixed;bottom:0;left:0;right:0;z-index:45;display:flex;gap:4px;overflow-x:auto;
  background:rgba(23,24,26,.97);border-top:1px solid var(--line);backdrop-filter:blur(6px);
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{font-family:var(--mono);font-size:12px;letter-spacing:.5px;padding:10px 14px;border-radius:8px;
  color:var(--dim);border:1px solid transparent;white-space:nowrap;flex:0 0 auto}
nav button.on{color:var(--text);background:var(--card);border-color:var(--line)}
nav button.on::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--accent);margin-right:6px;vertical-align:1px}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
.card h2{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:1px;color:var(--dim);
  text-transform:uppercase;margin-bottom:8px}
.starthere{border-left:3px solid var(--accent)}
.starthere .task-name{font-size:16px;font-weight:600}

/* energy bar */
.ebar{display:flex;height:10px;border-radius:5px;overflow:hidden;background:var(--card2);margin:6px 0 4px}
.ebar div{height:100%}
.elegend{display:flex;gap:12px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--dim)}
.elegend i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px}

/* filter chips */
.chips{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.chips button{font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:20px;
  border:1px solid var(--line);color:var(--dim);white-space:nowrap}
.chips button.on{color:#17181A;font-weight:700}

/* task rows */
.trow{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--line);
  border-radius:8px;padding:10px;margin-bottom:6px;position:relative;overflow:hidden}
.trow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--rail,var(--line))}
.tcircle{flex:0 0 auto;width:24px;height:24px;border-radius:50%;border:2px solid var(--dim);margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.tcircle.done{border-color:var(--done);color:var(--done)}
.tcircle.partial{border-color:var(--focus);color:var(--focus)}
.tbody{flex:1;min-width:0}
.tname{word-wrap:break-word}
.trow.isdone .tname{color:var(--dim);text-decoration:line-through}
.tmeta{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.tmeta .due-today{color:var(--focus)}
.tmeta .overdue{color:var(--accent)}
.tmeta .hard{color:var(--accent)}
.pname{font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--dim);margin:14px 2px 6px;text-transform:uppercase}

/* editor */
.editor{background:var(--card2);border-top:1px solid var(--line);margin:8px -10px -10px;padding:10px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px}
.editor .full{grid-column:1/-1}
.editor label{font-family:var(--mono);font-size:10px;color:var(--dim);display:block;margin-bottom:2px;text-transform:uppercase}
.editor .btnrow{grid-column:1/-1;display:flex;gap:8px;justify-content:flex-end}
.btn{padding:8px 14px;border-radius:6px;border:1px solid var(--line);font-family:var(--mono);font-size:12px}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.btn.danger{color:var(--accent)}

/* add bar — sits ABOVE the bottom nav */
#addbar{position:fixed;bottom:calc(54px + env(safe-area-inset-bottom));left:0;right:0;z-index:44;
  background:rgba(23,24,26,.97);border-top:1px solid var(--line);
  padding:8px 12px;backdrop-filter:blur(6px)}
#addbar .inner{max-width:576px;margin:0 auto}
#esel{display:flex;gap:6px;margin-bottom:6px}
#esel button{flex:1;font-family:var(--mono);font-size:11px;font-weight:700;padding:6px 0;border-radius:6px;
  border:1px solid var(--line);color:var(--dim)}
#esel button.on{color:#17181A}
#addrow{display:flex;gap:6px}
#addrow input{flex:1}
#addrow .btn{flex:0 0 auto;background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
#addhint{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:4px}

/* reflect */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-grid label{font-family:var(--mono);font-size:10px;color:var(--dim);display:block;margin-bottom:2px;text-transform:uppercase}
.metric-grid .full{grid-column:1/-1}
.goalrow{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line)}
.goalrow:last-child{border-bottom:none}
.goalrow input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent)}
.goalrow .g-meta{font-family:var(--mono);font-size:11px;color:var(--dim);margin-left:auto}
#scorePreview{font-family:var(--mono);font-size:28px;font-weight:700;text-align:center;padding:8px}
#scorePreview small{display:block;font-size:11px;color:var(--dim);font-weight:400}

/* brief markdown */
.md h1,.md h2,.md h3{font-family:var(--mono);margin:14px 0 6px;font-size:15px}
.md h1{font-size:17px}
.md h2{color:var(--accent)}
.md p,.md ul,.md ol{margin-bottom:8px}
.md ul,.md ol{padding-left:20px}
.md code{font-family:var(--mono);background:var(--card2);padding:1px 4px;border-radius:4px;font-size:13px}
.md strong{color:#fff}

/* log */
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
th,td{text-align:left;padding:5px 6px;border-bottom:1px solid var(--line)}
th{color:var(--dim);font-weight:400;text-transform:uppercase;font-size:10px}
.hit{color:var(--done)} .miss{color:var(--accent)} .rest{color:var(--dim)}

/* chat */
#chatlog{display:flex;flex-direction:column;gap:8px;min-height:40vh;max-height:60vh;overflow-y:auto;margin-bottom:10px;padding:2px}
.msg{max-width:86%;padding:9px 12px;border-radius:12px;font-size:14px;line-height:1.45;overflow-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:var(--card);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.bot p{margin:0 0 6px}.msg.bot p:last-child{margin:0}
.msg.bot ul,.msg.bot ol{margin:0 0 6px;padding-left:18px}
.msg.bot code{font-family:var(--mono);background:var(--card2);padding:1px 4px;border-radius:4px;font-size:12px}
#chatrow{display:flex;gap:6px}
.typing{color:var(--dim);font-family:var(--mono);font-size:12px;align-self:flex-start;padding:6px 2px}

/* brief accordion */
details.bsec{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden}
details.bsec summary{cursor:pointer;padding:12px;font-family:var(--mono);font-size:11px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;color:var(--text);list-style:none;display:flex;
  justify-content:space-between;align-items:center;user-select:none}
details.bsec summary::-webkit-details-marker{display:none}
details.bsec summary::after{content:'+';color:var(--dim);font-size:15px}
details.bsec[open] summary::after{content:'\2212'}
details.bsec>.md{padding:0 12px 12px}
details.bsec.hot summary{border-left:3px solid var(--accent);padding-left:9px}
details.bsec>.ginner{padding:0 10px 10px}
.md li{margin:3px 0}
.md{line-height:1.55}
.bio b{font-weight:700;color:#fff}

/* add-task sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--card);border:1px solid var(--line);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto}
.sheet h2{font-family:var(--mono);font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.sheet label{display:block;font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;margin:12px 0 6px}
.chiprow{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.chiprow.wrap{flex-wrap:wrap;overflow:visible}
.schip{font-family:var(--mono);font-size:12px;padding:7px 12px;border-radius:8px;border:1px solid var(--line);color:var(--dim);white-space:nowrap;flex:0 0 auto;background:none;cursor:pointer}
.schip.on{background:var(--text);border-color:var(--text);color:#17181A;font-weight:700}
.cal{margin-top:10px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px}
.cal-h{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:12px;margin-bottom:8px}
.cal-h button{padding:2px 12px;color:var(--dim);font-size:16px}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-g .dow{text-align:center;font-family:var(--mono);font-size:9px;color:var(--dim)}
.cal-d{position:relative;aspect-ratio:1;border-radius:6px;font-size:12px;color:var(--text);border:1px solid transparent;background:none}
.cal-d.today{border-color:var(--dim)}
.cal-d.sel{background:var(--accent);color:#fff;font-weight:700}
.cal-d i{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);font-style:normal;font-size:8px;color:var(--focus)}
.cal-d.sel i{color:#fff}

/* full calendar tab */
.cal-d.big{aspect-ratio:auto;min-height:48px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:4px;cursor:pointer}
.cal-d.big .marks{display:flex;gap:2px;margin-top:3px;align-items:center}
.cal-d.big .marks i{position:static;transform:none;width:5px;height:5px;border-radius:50%;display:block}
.cal-d.big .marks em{font-size:9px;color:var(--dim);font-style:normal;line-height:1}

/* flashcards */
.fc-front{font-size:17px;line-height:1.5;margin:10px 0}
.fc-back{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);line-height:1.5}

/* calendar events */
.evrow{display:flex;gap:10px;align-items:baseline;background:var(--card);border:1px solid var(--line);
  border-left:3px solid var(--dim);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:13px}
.evrow .mono{color:var(--dim);font-size:11px;white-space:nowrap}
.evb{position:absolute;top:2px;right:4px;font-size:8px;color:var(--dim);font-weight:400;font-style:normal;font-family:var(--mono)}

/* day view timeline */
.daygrid{position:relative;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:8px}
.hrow{position:absolute;left:0;right:0;border-top:1px solid var(--line);opacity:.55}
.hrow span{position:absolute;top:0;left:6px;font-family:var(--mono);font-size:9px;color:var(--dim)}
.evblk{position:absolute;left:52px;right:8px;background:rgba(225,37,27,.16);border:1px solid var(--accent);
  border-left:3px solid var(--accent);border-radius:6px;padding:2px 8px;font-size:12px;overflow:hidden;z-index:1}
.evblk b{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--dim);display:block}
.nowline{position:absolute;left:0;right:0;height:2px;background:var(--focus);z-index:2}

/* week agenda */
.wkday{font-family:var(--mono);font-size:12px;font-weight:700;margin-bottom:4px;cursor:pointer;letter-spacing:.5px}
.wkday.now{color:var(--accent)}
.wkline{font-size:13px;padding:3px 0;display:flex;gap:8px;align-items:center}
.wkline .mono{color:var(--dim);font-size:11px;min-width:46px}
.wkline i{width:6px;height:6px;border-radius:50%;flex:0 0 auto;display:inline-block}
.wkline.dim{color:var(--dim)}

/* auth */
#auth{max-width:340px;margin:80px auto;display:none}
#auth .card{padding:20px}
#auth input{margin-bottom:10px}
#authmsg{font-family:var(--mono);font-size:12px;color:var(--focus);margin-top:8px;min-height:16px}
.hidden{display:none!important}
#toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--card2);
  border:1px solid var(--line);border-radius:8px;padding:8px 16px;font-family:var(--mono);font-size:12px;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
#toast.show{opacity:1}
.empty{color:var(--dim);font-family:var(--mono);font-size:12px;text-align:center;padding:20px}
</style>
</head>
<body>

<div id="auth">
  <div class="card">
    <h1 style="font-family:var(--mono);margin-bottom:14px">LifeOS<span style="color:var(--accent)">.</span></h1>
    <input id="a-email" type="email" placeholder="email" autocomplete="username">
    <input id="a-pass" type="password" placeholder="password" autocomplete="current-password">
    <button class="btn primary" style="width:100%" onclick="signIn()">Sign in</button>
    <button class="btn" style="width:100%;margin-top:8px" onclick="signUp()">First time? Create account</button>
    <div id="authmsg"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <h1>LifeOS<span class="dot">.</span></h1>
    <span id="streakChip"></span>
  </header>
  <nav id="nav"></nav>
  <main id="main"></main>
  <div id="addbar" class="hidden">
    <div class="inner">
      <div id="addrow">
        <input id="addinput" placeholder="Add task ..." enterkeyhint="done">
        <button class="btn" onclick="addTask()">Add</button>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>
<div id="sheetroot"></div>

<script>
/* ================= CONFIG — the ONLY three lines a new user changes ==== */
/* (setting up your own LifeOS? See SETUP.md in this repo — Claude does it) */
const SB_URL = 'https://xebiaoycxwstrzgkjult.supabase.co';   // your Supabase project URL
const SB_KEY = 'sb_publishable_ecGABp0TAZcVX_TLIjBbOQ_rqUKNATw'; // your publishable key
const OWNER  = 'skyler.scooty@gmail.com';                    // your email, lowercase
const GCAL_CLIENT_ID = '118493693943-6l9gncbacaip7d4fct7cgdkr5l51nm1j.apps.googleusercontent.com'; // optional: live Google Calendar (blank = use routine sync only)
const db = window.supabase.createClient(SB_URL, SB_KEY);

const ENERGY = {
  DEEP:    {color:'var(--deep)',     hex:'#818CF8', score:3},
  FOCUS:   {color:'var(--focus)',    hex:'#FBBF24', score:2},
  LIGHT:   {color:'var(--light)',    hex:'#6EE7B7', score:1},
  PARALLEL:{color:'var(--parallel)', hex:'#C4B5FD', score:1},
};
const PRIO = {high:3, med:2, low:1};

/* ================= state ================= */
let S = {
  tasks: [], goals: [], goalLogsToday: [], brief: null, todayLog: null, prevLog: null,
  view: localStorage.getItem('view') || 'today',
  filt: localStorage.getItem('filt') || 'ALL',
  addEnergy: localStorage.getItem('addEnergy') || 'FOCUS',
  showBacklog: false, search: '', editing: null,
  chat: JSON.parse(localStorage.getItem('chatHistory') || '[]'), sending: false,
  sheet: null, expandAll: false, openGroups: new Set(),
  bionic: localStorage.getItem('bionic') === '1',
  cards: [], showBack: false, calY: null, calM: 0, calSel: null,
  calView: localStorage.getItem('calView') || 'month',
  gcalEvents: [], gcalRange: null, gcalLive: false, gcalLoading: false,
};

const todayISO = () => new Date().toLocaleDateString('sv-SE');
const esc = s => (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const toast = m => { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); };

/* ================= auth ================= */
async function signIn(){
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  const {error} = await db.auth.signInWithPassword({email, password: pass});
  document.getElementById('authmsg').textContent = error ? error.message : '';
}
async function signUp(){
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  if (email.toLowerCase() !== OWNER) { document.getElementById('authmsg').textContent = 'Single-user system.'; return; }
  if (pass.length < 8) { document.getElementById('authmsg').textContent = 'Password: 8+ chars.'; return; }
  const {error} = await db.auth.signUp({email, password: pass});
  document.getElementById('authmsg').textContent = error ? error.message : 'Check your email to confirm, then sign in.';
}
db.auth.onAuthStateChange((_e, session) => {
  document.getElementById('auth').style.display = session ? 'none' : 'block';
  document.getElementById('app').classList.toggle('hidden', !session);
  if (session) loadAll();
});
document.getElementById('a-email').value = OWNER;

/* ================= data ================= */
async function loadAll(){
  const today = todayISO();
  const [t, g, gl, b, dl, cd, ev] = await Promise.all([
    db.from('tasks').select('*').order('due', {ascending:true, nullsFirst:false}),
    db.from('weekly_goals').select('*').eq('active', true).order('sort'),
    db.from('goal_logs').select('*').eq('date', today),
    db.from('briefs').select('*').eq('date', today).maybeSingle(),
    db.from('daily_log').select('*').order('date', {ascending:false}).limit(90),
    db.from('cards').select('*').lte('due', today).eq('suspended', false).order('due').limit(50),
    db.from('events').select('*').order('date').limit(300),
  ]);
  S.tasks = t.data || []; S.goals = g.data || []; S.goalLogsToday = gl.data || [];
  S.cards = cd.data || []; S.events = ev.data || [];
  S.brief = b.data || null;
  const logs = dl.data || [];
  S.todayLog = logs.find(l => l.date === today) || null;
  S.prevLog  = logs.find(l => l.date < today) || null;
  S.logs = logs;
  render();
  subscribeRealtime();
  captureWake();
  // previously-connected Google Calendar: refresh the token silently
  if (localStorage.getItem('gconn') === '1' && !gcalToken()) setTimeout(() => gcalConnect(true), 800);
}

/* auto-capture wake time: first app open of the day, morning window only */
async function captureWake(){
  const today = todayISO();
  if (localStorage.getItem('wakeStamped') === today) return;
  if (S.todayLog?.wake_time) { localStorage.setItem('wakeStamped', today); return; }
  const now = new Date(), h = now.getHours();
  if (h < 4 || h >= 13) return; // opening the app at 3 AM or 8 PM is not "waking up"
  const hhmm = String(h).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  S.lastWrite = Date.now();
  const {error} = await db.from('daily_log').upsert({date: today, wake_time: hhmm}, {onConflict: 'date'});
  if (!error) {
    localStorage.setItem('wakeStamped', today);
    if (S.todayLog) S.todayLog.wake_time = hhmm; else S.todayLog = {date: today, wake_time: hhmm};
    toast('Wake captured: ' + hhmm);
  }
}

/* ================= live sync ================= */
let rtChannel = null, rtTimer = null;
function subscribeRealtime(){
  if (rtChannel) return;
  rtChannel = db.channel('lifeos-sync')
    .on('postgres_changes', {event: '*', schema: 'public'}, () => {
      // ignore the echo of our own writes — they're already on screen
      if (Date.now() - (S.lastWrite || 0) < 2500) return;
      clearTimeout(rtTimer);
      rtTimer = setTimeout(() => { if (!S.editing && !S.sending && !S.sheet) loadAll(); }, 600);
    })
    .subscribe();
}

/* quick-add parsing: #project !prio 90m/1.5h due:tom hard */
function parseQuickAdd(raw){
  let title = raw, out = {energy: S.addEnergy, bucket: (S.view === 'tasks' && S.showBacklog) ? 'backlog' : 'active'};
  const grab = (re, fn) => { const m = title.match(re); if (m) { fn(m); title = title.replace(re, ''); } };
  grab(/#(\S+)/,        m => out.project = m[1].replace(/-/g,' '));
  grab(/!(high|med|low)\b/i, m => out.priority = m[1].toLowerCase());
  grab(/\b(\d+(?:\.\d+)?)h\b/i, m => out.est_minutes = Math.round(parseFloat(m[1]) * 60));
  grab(/\b(\d+)m\b/i,   m => out.est_minutes = parseInt(m[1]));
  grab(/\bdue:(\S+)/i,  m => {
    const v = m[1].toLowerCase(); const d = new Date();
    if (v === 'today') out.due = todayISO();
    else if (v === 'tom' || v === 'tomorrow') { d.setDate(d.getDate()+1); out.due = d.toLocaleDateString('sv-SE'); }
    else if (/^\d{4}-\d{2}-\d{2}$/.test(v)) out.due = v;
  });
  grab(/\bhard\b/i, () => out.deadline_type = 'hard');
  if (out.due && !out.deadline_type) out.deadline_type = 'self_imposed';
  out.title = title.replace(/\s+/g,' ').trim();
  return out;
}

/* ================= scoring (Option A) ================= */
function weight(item, maxMin){
  const p = PRIO[item.priority] || 2;
  const e = (ENERGY[item.energy] || {score:1}).score;
  const tm = Math.min((item.est_minutes || 15) / (maxMin || 1), 1);
  return (p/3 + e/3 + tm) / 3;
}
function planItems(){
  if (S.brief?.plan?.length) return S.brief.plan;
  // fallback: tasks due today (any status) = the day's implicit plan
  return S.tasks.filter(t => t.bucket === 'active' && t.due === todayISO());
}
function computeScore(readBrief){
  const plan = planItems();
  const done = S.tasks.filter(isDoneToday);
  const partial = S.tasks.filter(t => isPartialToday(t) && t.status !== 'done');
  const actuals = S.goalLogsToday.map(gl => S.goals.find(g => g.id === gl.goal_id)).filter(g => g && g.est_minutes);
  const planNames = new Set(plan.map(p => (p.title || '').toLowerCase()));
  const offPlanActuals = actuals.filter(a => !planNames.has(a.name.toLowerCase()));
  const universe = [...plan, ...done, ...partial, ...offPlanActuals];
  const maxMin = Math.max(...universe.map(i => i.est_minutes || 15), 1);
  const den = plan.reduce((s, i) => s + weight(i, maxMin), 0);
  let num = done.reduce((s, i) => s + weight(i, maxMin), 0)
          + partial.reduce((s, i) => s + 0.5 * weight(i, maxMin), 0)
          + offPlanActuals.reduce((s, i) => s + weight(i, maxMin), 0);
  if (den === 0) return {score: null, planCount: 0, doneCount: done.length, partialCount: partial.length};
  let score = (num / den) * 100 + (readBrief ? 2 : 0);
  return {score: Math.min(Math.round(score * 10) / 10, 100), planCount: plan.length, doneCount: done.length, partialCount: partial.length};
}

/* swipe left/right (touch OR mouse drag) to switch tabs — page follows the finger */
(() => {
  const mainEl = document.getElementById('main');
  let sw = null;
  const excluded = t => t && t.closest && t.closest('nav,#addbar,#sheetroot,#auth,input,textarea,select,.chips,.chiprow');
  document.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    if (excluded(e.target)) return;
    if (S.sheet || S.editing) return;
    sw = {x: e.clientX, y: e.clientY, t: Date.now(), active: false};
  }, {passive: true});
  document.addEventListener('pointermove', e => {
    if (!sw) return;
    const dx = e.clientX - sw.x, dy = e.clientY - sw.y;
    if (!sw.active) {
      if (Math.abs(dy) > 14 && Math.abs(dy) > Math.abs(dx)) { sw = null; return; } // clearly vertical: scrolling wins
      if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy) * 1.2) {               // claim horizontal intent EARLY
        sw.active = true;
        document.body.style.userSelect = 'none';
      }
    }
    if (sw && sw.active) {
      mainEl.style.transition = 'none';
      mainEl.style.transform = `translateX(${dx}px)`;
      mainEl.style.opacity = String(Math.max(0.4, 1 - Math.abs(dx) / 600));
    }
  }, {passive: true});
  function slideTo(ni, dir, fromX){
    const w = Math.min(window.innerWidth, 640);
    // finish sliding the current page out in the direction of travel
    mainEl.style.transition = 'transform .13s ease-in, opacity .13s ease-in';
    mainEl.style.transform = `translateX(${-dir * w}px)`;
    mainEl.style.opacity = '0';
    setTimeout(() => {
      setView(VIEWS[ni][0]);
      // place the new page just off-screen on the other side, then slide it in
      mainEl.style.transition = 'none';
      mainEl.style.transform = `translateX(${dir * w * 0.55}px)`;
      mainEl.style.opacity = '0.3';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        mainEl.style.transition = 'transform .2s cubic-bezier(.2,.8,.3,1), opacity .2s';
        mainEl.style.transform = ''; mainEl.style.opacity = '';
      }));
    }, 130);
  }
  const endSwipe = e => {
    if (!sw) return;
    if (e.type === 'pointercancel' && !e.clientX && !e.clientY) { // browser stole it and gave us nothing
      sw = null; document.body.style.userSelect = '';
      mainEl.style.transition = 'transform .18s ease, opacity .18s';
      mainEl.style.transform = ''; mainEl.style.opacity = '';
      return;
    }
    const dx = e.clientX - sw.x, dy = e.clientY - sw.y, dt = Date.now() - sw.t;
    const wasActive = sw.active; sw = null;
    document.body.style.userSelect = '';
    const snapBack = () => {
      mainEl.style.transition = 'transform .18s cubic-bezier(.2,.8,.3,1), opacity .18s';
      mainEl.style.transform = ''; mainEl.style.opacity = '';
    };
    if (!wasActive || S.sheet || S.editing) { snapBack(); return; }
    // a real drag shouldn't also count as a click on whatever's under the finger
    const kill = ev => { ev.stopPropagation(); ev.preventDefault(); };
    document.addEventListener('click', kill, {capture: true, once: true});
    setTimeout(() => document.removeEventListener('click', kill, {capture: true}), 120);
    const flick = dt < 250 && Math.abs(dx) > 40;             // quick flick
    const drag  = Math.abs(dx) > 70;                          // deliberate drag
    if ((!flick && !drag) || Math.abs(dx) < Math.abs(dy) * 1.2) { snapBack(); return; }
    const i = VIEWS.findIndex(v => v[0] === S.view);
    const ni = i + (dx < 0 ? 1 : -1);
    if (ni < 0 || ni >= VIEWS.length) { snapBack(); return; }
    slideTo(ni, dx < 0 ? 1 : -1);
  };
  document.addEventListener('pointerup', endSwipe);
  document.addEventListener('pointercancel', endSwipe); // gesture stolen mid-drag still commits if it traveled far enough
})();
function bionicify(root){
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes = []; let n;
  while ((n = walker.nextNode())) nodes.push(n);
  nodes.forEach(node => {
    const txt = node.nodeValue;
    if (!txt.trim()) return;
    if (node.parentElement.closest('code,pre')) return;
    const span = document.createElement('span'); span.className = 'bio';
    span.innerHTML = esc(txt).replace(/[A-Za-zÀ-ɏ]{2,}/g, w => {
      const k = Math.ceil(w.length * 0.45);
      return '<b>' + w.slice(0, k) + '</b>' + w.slice(k);
    });
    node.parentNode.replaceChild(span, node);
  });
}

/* --- TODAY --- */
function rToday(){
  const today = todayISO();
  const active = S.tasks.filter(t => t.bucket === 'active');
  const todays = active.filter(t =>
    (t.due && t.due <= today && t.status !== 'done') ||
    t.status === 'in_progress' || isPartialToday(t) || isDoneToday(t));
  const open = todays.filter(t => t.status !== 'done');
  // energy distribution
  const dist = {}; let total = 0;
  open.forEach(t => { const m = t.est_minutes || 15; dist[t.energy || 'FOCUS'] = (dist[t.energy || 'FOCUS'] || 0) + m; total += m; });
  const bar = total ? `<div class="ebar">` + Object.entries(dist).map(([e, m]) =>
      `<div style="width:${(m / total * 100).toFixed(1)}%;background:${(ENERGY[e] || {}).hex}"></div>`).join('') + `</div>
    <div class="elegend">` + Object.entries(dist).map(([e, m]) =>
      `<span><i style="background:${(ENERGY[e] || {}).hex}"></i>${e} ${Math.round(m/60*10)/10}h</span>`).join('') +
      `<span style="margin-left:auto">${Math.round(total/60*10)/10}h open</span></div>` : '';
  const sh = S.brief?.start_here_task;
  const shCard = sh ? `<div class="card starthere"><h2>Start here</h2><div class="task-name">${esc(sh)}</div></div>` : '';
  const meter = rMeter();
  const todaysEv = allEvents().filter(e => e.date === today).sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
  const evCard = todaysEv.length ? `<div class="card"><h2>Calendar</h2>${todaysEv.map(e =>
    `<div class="evrow" style="margin-bottom:4px"><span class="mono">${e.start_time ? esc(e.start_time) + (e.end_time ? '–' + esc(e.end_time) : '') : 'all-day'}</span><span>${esc(e.title)}</span></div>`).join('')}</div>` : '';
  const list = applyFilt(todays);
  const sorted = [...list].sort((a, b) =>
    (a.status === 'done') - (b.status === 'done') ||
    (a.due || '9999').localeCompare(b.due || '9999') ||
    (PRIO[b.priority] || 2) - (PRIO[a.priority] || 2));
  return shCard + meter + evCard +
    (bar ? `<div class="card"><h2>Today's energy</h2>${bar}</div>` : '') +
    chipsHTML() +
    (sorted.length ? sorted.map(taskRowHTML).join('') : `<div class="empty">Nothing on deck — add a task below or check TASKS.</div>`);
}
/* live "what do I need tonight" meter */
function rMeter(){
  const r = computeScore(S.todayLog?.read_brief ?? false);
  if (r.score === null) return '';
  const hit = r.score >= 70;
  const plan = planItems();
  const doneTitles = new Set(S.tasks.filter(isDoneToday).map(t => (t.title || '').toLowerCase()));
  const open = plan.filter(p => !doneTitles.has((p.title || '').toLowerCase()));
  const universe = [...plan, ...S.tasks.filter(isDoneToday)];
  const maxMin = Math.max(...universe.map(i => i.est_minutes || 15), 1);
  const den = plan.reduce((s, i) => s + weight(i, maxMin), 0);
  let hint = 'streak already hit — everything else is bonus';
  if (!hit && den > 0) {
    const sorted = [...open].sort((a, b) => weight(b, maxMin) - weight(a, maxMin));
    let s = r.score; const picks = [];
    for (const p of sorted) { if (s >= 70) break; s += weight(p, maxMin) / den * 100; picks.push(p.title); }
    hint = (picks.length && s >= 70)
      ? `finish <b>${picks.map(esc).join('</b> + <b>')}</b> → ~${Math.round(s)} · streak safe`
      : 'streak needs most of the plan — start with the heaviest item';
  }
  return `<div class="card"><h2>Score meter</h2>
    <div style="display:flex;align-items:baseline;gap:10px">
      <span class="mono" style="font-size:26px;font-weight:700;color:${hit ? 'var(--done)' : 'var(--accent)'}">${r.score}</span>
      <span class="dim" style="font-size:12px">${hint}</span>
    </div>
    <div class="ebar" style="margin-top:8px"><div style="width:${Math.min(r.score, 100)}%;background:${hit ? '#4ADE80' : '#E1251B'}"></div></div>
  </div>`;
}

/* --- TRENDS (read-only analytics from daily_log + tasks) --- */
function rTrends(){
  const logs = [...(S.logs || [])].reverse(); // chronological
  const W = 560, H = 150, P = 10;
  // score line — last 30 scored (non-rest) days
  const pts = logs.filter(l => l.score != null && !l.rest_day).slice(-30);
  const line = pts.map((l, i) => ({
    x: P + i * (W - 2*P) / Math.max(pts.length - 1, 1),
    y: H - P - (Math.min(+l.score, 100) / 100) * (H - 2*P),
    hit: l.streak_hit, d: l.date, s: +l.score,
  }));
  const y70 = H - P - 0.7 * (H - 2*P);
  const scoreSvg = line.length > 1 ? `<svg viewBox="0 0 ${W} ${H}" style="width:100%">
      <line x1="${P}" y1="${y70}" x2="${W-P}" y2="${y70}" stroke="var(--line)" stroke-dasharray="4 4"/>
      <polyline fill="none" stroke="var(--accent)" stroke-width="2" points="${line.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ')}"/>
      ${line.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="${p.hit ? '#4ADE80' : '#E1251B'}"><title>${p.d}: ${p.s}</title></circle>`).join('')}
    </svg><div class="dim mono" style="font-size:10px">green dot = streak hit · dashed line = 70</div>`
    : '<div class="empty">Not enough scored days yet — this fills in as you save reflections.</div>';
  // energy minutes done per day — last 14 days, stacked by energy
  const days = [...Array(14)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - 13 + i); return d.toLocaleDateString('sv-SE'); });
  const per = days.map(d => {
    const o = {DEEP: 0, FOCUS: 0, LIGHT: 0, PARALLEL: 0};
    S.tasks.forEach(t => { if (t.status === 'done' && (t.completed_at || '').slice(0, 10) === d) o[t.energy || 'FOCUS'] += (t.est_minutes || 15); });
    return {d, o, total: Object.values(o).reduce((a, b) => a + b, 0)};
  });
  const max = Math.max(...per.map(p => p.total), 60);
  const BW = (W - 2*P) / 14;
  const barsSvg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%">${per.map((p, i) => {
      let y = H - P;
      return Object.entries(p.o).map(([e, m]) => {
        if (!m) return '';
        const h = (m / max) * (H - 2*P); y -= h;
        return `<rect x="${(P + i*BW + 2).toFixed(1)}" y="${y.toFixed(1)}" width="${(BW - 4).toFixed(1)}" height="${h.toFixed(1)}" fill="${ENERGY[e].hex}" rx="2"><title>${p.d} ${e}: ${Math.round(m/60*10)/10}h</title></rect>`;
      }).join('');
    }).join('')}</svg>`;
  // stats
  const wakes = logs.filter(l => l.wake_time).slice(-7);
  const wakeAvg = wakes.length ? (() => {
    const m = wakes.reduce((s, l) => { const [h, mm] = (l.wake_time || '0:0').split(':').map(Number); return s + (h || 0) * 60 + (mm || 0); }, 0) / wakes.length;
    return `${Math.floor(m/60)}:${String(Math.round(m % 60)).padStart(2, '0')}`;
  })() : '—';
  const best = Math.max(...logs.map(l => l.streak_count || 0), 0);
  const fl = logs.filter(l => l.focus);
  const focusAvg = fl.length ? (fl.reduce((s, l) => s + l.focus, 0) / fl.length).toFixed(1) : '—';
  const deep7 = per.slice(-7).reduce((s, p) => s + p.o.DEEP, 0);
  return `
  <div class="card"><h2>Score — last ${line.length} scored days</h2>${scoreSvg}</div>
  <div class="card"><h2>Done work by energy — 14 days</h2>${barsSvg}
    <div class="elegend" style="margin-top:6px">${Object.keys(ENERGY).map(e => `<span><i style="background:${ENERGY[e].hex}"></i>${e}</span>`).join('')}</div></div>
  <div class="card"><h2>Stats</h2><table>
    <tr><td>current streak</td><td>${S.todayLog?.streak_count ?? S.prevLog?.streak_count ?? 0}d</td></tr>
    <tr><td>best recorded streak</td><td>${best}d</td></tr>
    <tr><td>DEEP hours, last 7 days</td><td>${Math.round(deep7/60*10)/10}h</td></tr>
    <tr><td>avg wake (last ${wakes.length} logged)</td><td>${wakeAvg}</td></tr>
    <tr><td>avg focus</td><td>${focusAvg}/5</td></tr>
    <tr><td>rest days in window</td><td>${logs.filter(l => l.rest_day).length}</td></tr>
  </table></div>`;
}

/* --- live Google Calendar (OAuth, optional) --- */
let gTokClient = null;
function gcalToken(){ const t = JSON.parse(localStorage.getItem('gtok') || 'null'); return (t && t.exp > Date.now()) ? t.token : null; }
function gcalConnect(silent){
  if (!GCAL_CLIENT_ID || !window.google?.accounts?.oauth2) { if (!silent) toast('Google auth not loaded yet — try again'); return; }
  gTokClient = gTokClient || google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/calendar.readonly',
    callback: r => {
      if (r.access_token) {
        localStorage.setItem('gtok', JSON.stringify({token: r.access_token, exp: Date.now() + (r.expires_in - 60) * 1000}));
        localStorage.setItem('gconn', '1');
        S.gcalRange = null; render();
      }
    },
    error_callback: () => { if (!silent) toast('Google connect cancelled'); },
  });
  gTokClient.requestAccessToken({prompt: silent ? '' : undefined});
}
function gcalDisconnect(){
  if (!confirm('Disconnect Google Calendar? (Falls back to daily routine sync)')) return;
  localStorage.removeItem('gtok'); localStorage.removeItem('gconn');
  S.gcalLive = false; S.gcalRange = null; S.gcalEvents = []; render();
}
function allEvents(){ return S.gcalLive ? S.gcalEvents : (S.events || []); }
async function loadGcal(anchorISO){
  const tok = gcalToken();
  if (!tok) { S.gcalLive = false; return; }
  const a = fromISO(anchorISO);
  const start = new Date(a); start.setDate(a.getDate() - 31);
  const end = new Date(a); end.setDate(a.getDate() + 62);
  const key = start.toISOString().slice(0, 10) + '_' + end.toISOString().slice(0, 10);
  if (S.gcalRange === key || S.gcalLoading) return;
  S.gcalLoading = true;
  try {
    const r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?singleEvents=true&orderBy=startTime&maxResults=250&timeMin=${start.toISOString()}&timeMax=${end.toISOString()}`,
      {headers: {Authorization: 'Bearer ' + tok}});
    if (r.status === 401) { localStorage.removeItem('gtok'); S.gcalLive = false; S.gcalLoading = false; render(); return; }
    const d = await r.json();
    const pad = n => String(n).padStart(2, '0');
    const out = [];
    (d.items || []).forEach(ev => {
      if (ev.status === 'cancelled') return;
      const title = ev.summary || '(untitled)';
      if (ev.start?.dateTime) {
        const sd = new Date(ev.start.dateTime), ed = ev.end?.dateTime ? new Date(ev.end.dateTime) : null;
        out.push({date: sd.toLocaleDateString('sv-SE'), start_time: pad(sd.getHours()) + ':' + pad(sd.getMinutes()),
          end_time: ed ? pad(ed.getHours()) + ':' + pad(ed.getMinutes()) : null, title});
      } else if (ev.start?.date) {
        const d0 = fromISO(ev.start.date), d1 = fromISO(ev.end?.date || ev.start.date);
        if (d0 >= d1) out.push({date: ev.start.date, start_time: null, end_time: null, title});
        else { const c = new Date(d0); while (c < d1) { out.push({date: c.toLocaleDateString('sv-SE'), start_time: null, end_time: null, title}); c.setDate(c.getDate() + 1); } }
      }
    });
    S.gcalEvents = out; S.gcalRange = key; S.gcalLive = true;
  } catch (_e) { /* keep table fallback */ }
  S.gcalLoading = false;
  render();
}

function calMaps(){
  const byDay = {}, evByDay = {};
  S.tasks.forEach(t => { if (t.due && t.bucket === 'active' && t.status !== 'done') (byDay[t.due] = byDay[t.due] || []).push(t); });
  allEvents().forEach(e => { (evByDay[e.date] = evByDay[e.date] || []).push(e); });
  return {byDay, evByDay};
}
function rCal(){
  if (S.calY == null) { const n = new Date(); S.calY = n.getFullYear(); S.calM = n.getMonth(); }
  if (!S.calSel) S.calSel = todayISO();
  const {byDay, evByDay} = calMaps();
  const sel = fromISO(S.calSel);
  let label;
  if (S.calView === 'month') label = new Date(S.calY, S.calM, 1).toLocaleString('en-US', {month: 'long', year: 'numeric'});
  else if (S.calView === 'day') label = sel.toLocaleDateString('en-US', {weekday: 'short', month: 'short', day: 'numeric'});
  else {
    const mon = new Date(sel); mon.setDate(sel.getDate() - ((sel.getDay() + 6) % 7));
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    label = mon.toLocaleDateString('en-US', {month: 'short', day: 'numeric'}) + ' – ' + sun.toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
  }
  const header = `<div class="cal-h" style="margin-bottom:8px">
    <button onclick="navCal(-1)">‹</button><span class="mono">${label}</span>
    <span><button class="btn" style="padding:2px 10px;font-size:10px;margin-right:6px" onclick="calToday()">today</button><button onclick="navCal(1)">›</button></span></div>
  <div class="chiprow" style="margin-bottom:10px">${['day','week','month'].map(v =>
    `<button class="schip ${S.calView === v ? 'on' : ''}" style="flex:1" onclick="setCalView('${v}')">${v.toUpperCase()}</button>`).join('')}
    ${GCAL_CLIENT_ID ? (gcalToken()
      ? `<button class="schip" style="color:${S.gcalLive ? 'var(--done)' : 'var(--dim)'}" onclick="gcalDisconnect()">● ${S.gcalLive ? 'live' : '…'}</button>`
      : `<button class="schip" onclick="gcalConnect(false)">connect Google</button>`) : ''}</div>`;
  loadGcal(`${S.calY}-${String(S.calM + 1).padStart(2, '0')}-15`);
  const body = S.calView === 'day' ? calDayHTML(S.calSel, byDay, evByDay)
             : S.calView === 'week' ? calWeekHTML(byDay, evByDay)
             : calMonthHTML(byDay, evByDay);
  return header + body;
}
function calMonthHTML(byDay, evByDay){
  const y = S.calY, m = S.calM;
  const startDow = (new Date(y, m, 1).getDay() + 6) % 7;
  const days = new Date(y, m + 1, 0).getDate();
  let cells = '';
  for (let i = 0; i < startDow; i++) cells += '<span></span>';
  for (let d = 1; d <= days; d++) {
    const iso = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const ts = byDay[iso] || [];
    const evN = (evByDay[iso] || []).length;
    const marks = ts.slice(0, 4).map(t => `<i style="background:${(ENERGY[t.energy] || {}).hex || '#666'}"></i>`).join('');
    cells += `<button class="cal-d big ${S.calSel === iso ? 'sel' : ''} ${iso === todayISO() ? 'today' : ''}" onclick="selDay('${iso}')">
      ${evN ? `<em class="evb">${evN}▸</em>` : ''}<span>${d}</span><div class="marks">${marks}${ts.length > 4 ? '<em>+</em>' : ''}</div></button>`;
  }
  return `<div class="card">
    <div class="cal-g">${['M','T','W','T','F','S','S'].map(d => `<span class="dow">${d}</span>`).join('')}${cells}</div>
    <div class="elegend" style="margin-top:8px">${Object.keys(ENERGY).map(e => `<span><i style="background:${ENERGY[e].hex}"></i>${e}</span>`).join('')}<span style="margin-left:auto" class="dim">n▸ = events · tap a day</span></div>
  </div>`;
}
function calWeekHTML(byDay, evByDay){
  const anchor = fromISO(S.calSel);
  const mon = new Date(anchor); mon.setDate(anchor.getDate() - ((anchor.getDay() + 6) % 7));
  let out = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    const iso = d.toLocaleDateString('sv-SE');
    const evs = (evByDay[iso] || []).slice().sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
    const ts = byDay[iso] || [];
    out += `<div class="card" style="padding:8px 12px">
      <div class="wkday ${iso === todayISO() ? 'now' : ''}" onclick="selDay('${iso}')">${d.toLocaleDateString('en-US', {weekday: 'short'}).toUpperCase()} ${d.getDate()}${iso === todayISO() ? ' · TODAY' : ''}</div>
      ${evs.map(e => `<div class="wkline"><span class="mono">${e.start_time ? esc(e.start_time) : 'all-day'}</span><span>${esc(e.title)}</span></div>`).join('')}
      ${ts.map(t => `<div class="wkline"><i style="background:${(ENERGY[t.energy] || {}).hex || '#666'}"></i><span>${esc(t.title)}</span></div>`).join('')}
      ${!evs.length && !ts.length ? '<div class="wkline dim">—</div>' : ''}
    </div>`;
  }
  return out;
}
function calDayHTML(iso, byDay, evByDay){
  const evs = (evByDay[iso] || []).slice().sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
  const allday = evs.filter(e => !e.start_time);
  const timed = evs.filter(e => e.start_time);
  const H0 = 6, H1 = 24, PPH = 48;
  const blocks = timed.map(e => {
    const [sh, sm] = e.start_time.split(':').map(Number);
    let dur = 60;
    if (e.end_time) { const [eh, em] = e.end_time.split(':').map(Number); dur = Math.max(20, (eh * 60 + em) - (sh * 60 + sm)); }
    const top = Math.max(0, ((sh - H0) * 60 + sm) * (PPH / 60));
    const h = Math.max(22, dur * (PPH / 60));
    return `<div class="evblk" style="top:${top.toFixed(0)}px;height:${h.toFixed(0)}px"><b>${esc(e.start_time)}${e.end_time ? '–' + esc(e.end_time) : ''}</b>${esc(e.title)}</div>`;
  }).join('');
  const rail = [...Array(H1 - H0)].map((_, i) => `<div class="hrow" style="top:${i * PPH}px"><span>${String(H0 + i).padStart(2, '0')}:00</span></div>`).join('');
  const nowLine = iso === todayISO() ? (() => {
    const n = new Date(); const mins = (n.getHours() - H0) * 60 + n.getMinutes();
    return (mins > 0 && mins < (H1 - H0) * 60) ? `<div class="nowline" style="top:${(mins * PPH / 60).toFixed(0)}px"></div>` : '';
  })() : '';
  const due = byDay[iso] || [];
  const doneDay = S.tasks.filter(t => t.due === iso && t.status === 'done');
  return `${allday.map(e => `<div class="evrow"><span class="mono">all-day</span><span>${esc(e.title)}</span></div>`).join('')}
  ${due.length || doneDay.length ? `<div class="pname">due — ${due.length} open${doneDay.length ? ' · ' + doneDay.length + ' done' : ''}</div>` : ''}
  ${due.map(taskRowHTML).join('')}
  <div class="daygrid" style="height:${(H1 - H0) * PPH}px">${rail}${blocks}${nowLine}</div>
  <button class="btn" style="width:100%;margin-top:8px" onclick="addForDay()">+ add task due ${iso}</button>
  <div style="height:10px"></div>`;
}

/* --- CARDS (spaced-repetition flashcards, replaces Anki) --- */
function rCards(){
  const q = S.cards || [];
  if (!q.length) return `<div class="empty">No cards due.<br><br>New cards arrive with each morning brief that has a call-learning topic.<br>Reviews reschedule themselves — come back tomorrow.</div>`;
  const c = q[0];
  return `<div class="pname">${q.length} due</div>
  <div class="card">
    <h2>${esc(c.category || 'card')}${c.topic ? ' · ' + esc(c.topic) : ''}</h2>
    <div class="fc-front">${esc(c.front)}</div>
    ${S.showBack ? `<div class="fc-back">${esc(c.back)}</div>` : ''}
  </div>
  ${S.showBack
    ? `<div style="display:flex;gap:8px">
        <button class="btn" style="flex:1;color:var(--accent)" onclick="gradeCard(0)">Again</button>
        <button class="btn" style="flex:1" onclick="gradeCard(1)">Good</button>
        <button class="btn" style="flex:1;color:var(--done)" onclick="gradeCard(2)">Easy</button>
      </div>
      <button class="btn" style="width:100%;margin-top:8px;color:var(--dim)" onclick="suspendCard()">suspend card</button>`
    : `<button class="btn primary" style="width:100%;padding:12px" onclick="S.showBack=true;render()">Show answer</button>`}
  <div style="height:10px"></div>`;
}
async function gradeCard(g){
  const c = (S.cards || [])[0]; if (!c) return;
  let iv = c.interval_days, ease = +c.ease, reps = c.reps, lapses = c.lapses;
  if (g === 0)      { lapses++; iv = 0; ease = Math.max(1.3, ease - 0.2); }
  else if (g === 1) { iv = iv < 1 ? 1 : Math.round(iv * ease); reps++; }
  else              { ease += 0.15; iv = Math.max(2, Math.round((iv || 1) * ease * 1.3)); reps++; }
  const d = new Date(); d.setDate(d.getDate() + iv);
  const patch = {interval_days: iv, ease, reps, lapses, due: g === 0 ? todayISO() : d.toLocaleDateString('sv-SE')};
  S.lastWrite = Date.now();
  db.from('cards').update(patch).eq('id', c.id).then(({error}) => { if (error) toast('Save failed: ' + error.message); });
  S.cards.shift();
  if (g === 0) S.cards.push({...c, ...patch}); // failed cards come back this session
  S.showBack = false; render();
}
async function suspendCard(){
  const c = (S.cards || [])[0]; if (!c) return;
  S.lastWrite = Date.now();
  await db.from('cards').update({suspended: true}).eq('id', c.id);
  S.cards.shift(); S.showBack = false; render(); toast('Suspended');
}

/* --- CHAT (embedded, via Supabase edge function -> Claude API) --- */
function rChat(){
  const msgs = S.chat.map(m => m.role === 'user'
    ? `<div class="msg user">${esc(m.content)}</div>`
    : `<div class="msg bot">${marked.parse(m.content || '')}</div>`).join('');
  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h2 style="margin:0">LifeOS chat</h2>
      <button class="btn" style="padding:4px 10px;font-size:11px" onclick="clearChat()">Clear</button>
    </div>
    <div id="chatlog">${msgs || '<div class="empty">Talk to your system. "done with X" · "whats next" · "im gassed" · "add task: ..."</div>'}${S.sending ? '<div class="typing">thinking…</div>' : ''}</div>
    <div id="chatrow">
      <input id="chatinput" placeholder="what's next?" enterkeyhint="send" ${S.sending ? 'disabled' : ''}>
      <button class="btn primary" onclick="sendChat()" ${S.sending ? 'disabled' : ''}>Send</button>
    </div>
  </div>`;
}
function clearChat(){
  if (S.chat.length && !confirm('Clear conversation?')) return;
  S.chat = []; localStorage.removeItem('chatHistory'); render();
}
async function sendChat(){
  const inp = document.getElementById('chatinput');
  const text = (inp?.value || '').trim();
  if (!text || S.sending) return;
  S.chat.push({role: 'user', content: text});
  S.sending = true; render();
  try {
    const {data: {session}} = await db.auth.getSession();
    const r = await fetch(SB_URL + '/functions/v1/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token},
      body: JSON.stringify({messages: S.chat.slice(-20)}),
    });
    const d = await r.json();
    S.chat.push({role: 'assistant', content: d.reply || ('⚠ ' + (d.error || 'HTTP ' + r.status))});
  } catch (e) {
    S.chat.push({role: 'assistant', content: '⚠ Network error: ' + e.message});
  }
  S.sending = false;
  S.chat = S.chat.slice(-40);
  localStorage.setItem('chatHistory', JSON.stringify(S.chat));
  render();
  loadAll(); // chat may have written to the DB
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement?.id === 'chatinput') sendChat();
});

/* ================= PWA ================= */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
